  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#0066FF',hover:'#0052CC',active:'#0047B3',bg:'#E6F0FF'},ink:{title:'#1A1D24',body:'#3A3F4A',sub:'#6E7685',muted:'#9DA2AC'},line:{DEFAULT:'#DFE1E5',light:'#E8EAED',lighter:'#F0F1F3'},bg:{page:'#F7F8FA',card:'#FFFFFF',hover:'#F3F4F6'},success:{DEFAULT:'#0FC060',bg:'#E7F9F0'},warning:{DEFAULT:'#E7772D',bg:'#FDF2E9'},danger:{DEFAULT:'#D9001B',bg:'#FFE8EB'},info:{DEFAULT:'#0091D5',bg:'#E4F4FB'}},borderRadius:{DEFAULT:'4px',md:'6px',lg:'8px'},fontFamily:{sans:['-apple-system','BlinkMacSystemFont','PingFang SC','Microsoft YaHei','Hiragino Sans GB','Segoe UI','system-ui','sans-serif'],mono:['JetBrains Mono','monospace']}}}}</script>
  <style>
    body{overflow:hidden;}
    .tab-badge{position:absolute;top:6px;right:-14px;min-width:16px;height:16px;padding:0 4px;background:#FF4D4F;border-radius:8px;color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;line-height:1;}
    .filter-chip{padding:5px 14px;border-radius:16px;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;border:1px solid #DFE1E5;color:#6E7685;background:#fff;display:inline-flex;align-items:center;gap:4px;}
    .filter-chip:hover{border-color:#0066FF;color:#0066FF;}
    .filter-chip.active{background:#E6F0FF;color:#0066FF;border-color:#0066FF;font-weight:500;}
    .filter-chip .chip-badge{min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:#FF4D4F;color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;}
    .filter-chip.active .chip-badge{background:#0066FF;}
    .msg-item{padding:14px 0;border-bottom:1px solid #F0F1F3;cursor:pointer;transition:background .12s;}
    .msg-item:hover{background:#FAFBFC;}
    .msg-item .msg-dot{width:8px;height:8px;border-radius:50%;background:#0066FF;flex-shrink:0;margin-top:6px;}
    .msg-item.read .msg-dot{background:transparent;}
    .msg-item.read .msg-title{color:#9DA2AC;font-weight:400;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;}
    .modal{background:#fff;border-radius:8px;width:500px;max-width:90%;max-height:70vh;display:flex;flex-direction:column;box-shadow:0 6px 24px rgba(0,0,0,.12);}
    .modal-sm{width:360px;}.modal-lg{width:600px;}
    .modal-header{padding:16px 20px;border-bottom:1px solid #DFE1E5;display:flex;align-items:center;justify-content:space-between;font-size:15px;font-weight:600;color:#1A1D24;}
    .modal-body{padding:20px;overflow-y:auto;flex:1;}
    .modal-footer{padding:12px 20px;border-top:1px solid #DFE1E5;display:flex;justify-content:flex-end;gap:8px;}
  
.menu-item{cursor:pointer;transition:background .12s,color .12s;user-select:none;display:flex;align-items:center;gap:10px;padding:10px 16px;color:#1A1D24;font-size:13px;position:relative;text-decoration:none;}
.menu-item:hover{background:#F3F4F6;}
.menu-item.l1{padding-left:20px;font-weight:500;}
.menu-item.l2{padding-left:64px;}
.menu-item.active-l1{color:#0066FF;}
.menu-item.active-l2{background:#E6F0FF;color:#0066FF;font-weight:500;}
.menu-ico{width:28px;height:28px;border-radius:7px;border:1.5px solid #D0D3D9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#6E7685;flex-shrink:0;transition:all .15s;}
.active-l1 .menu-ico{background:#0066FF;border-color:#0066FF;color:#fff;}
.menu-arrow{font-size:10px;color:#9DA2AC;margin-left:auto;transition:transform .2s;flex-shrink:0;}
.menu-arrow.open{transform:rotate(180deg);}
.submenu{overflow:hidden;transition:max-height .25s ease,opacity .2s;}
.submenu.collapsed{max-height:0!important;opacity:0;}
.new-tag{display:inline-block;padding:1px 7px;border-radius:8px;background:#0066FF;color:#fff;font-size:10px;font-weight:600;line-height:16px;margin-left:4px;}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:32px;padding:0 14px;font-size:13px;font-weight:500;border-radius:4px;border:1px solid transparent;cursor:pointer;transition:all .15s;outline:none;}
.btn-primary{background:#0066FF;color:#fff;border-color:#0066FF;}
.btn-primary:hover{background:#0052CC;}
.btn-default{background:#fff;color:#3A3F4A;border-color:#DFE1E5;}
.btn-default:hover{border-color:#0066FF;color:#0066FF;}
/* Topbar icons */
.topbar-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:#F3F4F6;cursor:pointer;transition:background .15s;position:relative;border:none;outline:none;}
.topbar-btn:hover{background:#E6F0FF;}
.topbar-btn:hover svg{stroke:#0066FF;}
.badge-dot{position:absolute;top:-2px;right:-2px;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#FF3B30;color:#fff;font-size:10px;font-weight:600;line-height:18px;text-align:center;}
/* Sidebar toggle (mobile) */
@media(max-width:768px){
  .sidebar{display:none;}
  .sidebar.open{display:flex;position:fixed;top:56px;left:0;bottom:0;z-index:50;}
  .sidebar-overlay{display:none;}
  .sidebar-overlay.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:49;}
}

</style>

<!-- ===== TOAST ===== -->
<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-lg text-white text-[13px] font-medium z-[200] opacity-0 transition-opacity duration-300 pointer-events-none whitespace-nowrap" style="background:#1A1D24;"></div>

<script>
/* ===== DATA - 游寄业务消息 ===== */
const notifications = [
  { id:'n1', title:'【订单分配】张伟、李娜、王强等5个订单分配给你，请及时处理', category:'reminder', sub:'order_assign', isRead:false, time:'2026-07-03 14:00' },
  { id:'n2', title:'【行李寄存到期提醒】客户138****5678的行李寄存将于明天到期', category:'reminder', sub:'storage_expire', isRead:false, time:'2026-07-03 13:30' },
  { id:'n3', title:'【退款申请待审核】订单号 YJ20260703001 用户申请退款，请审核', category:'reminder', sub:'refund_review', isRead:false, time:'2026-07-03 12:00' },
  { id:'n4', title:'【柜机故障告警】柜机 LK-031 传感器通信异常，请及时检修', category:'exception', sub:'locker_fault', isRead:false, time:'2026-07-03 11:00' },
  { id:'n5', title:'【行李超时未领取】订单 YJ20260701015 寄存到期72小时未领取，升级告警', category:'exception', sub:'storage_overtime', isRead:false, time:'2026-07-03 10:00' },
  { id:'n6', title:'【订单超时未完成】订单 YJ20260628008 创建72小时未完成', category:'exception', sub:'order_overtime', isRead:true, time:'2026-07-02 18:00' },
  { id:'n7', title:'【订单转移】订单 YJ20260702020 从王强转移给你，请及时处理', category:'reminder', sub:'order_transfer', isRead:true, time:'2026-07-02 16:00' },
  { id:'n8', title:'【柜机即将满载】柜机 LK-018 使用率达85%，请及时调配', category:'exception', sub:'locker_full', isRead:true, time:'2026-07-02 15:00' },
  { id:'n9', title:'【异常件处理完成】工单 TK20260702005 已处理完毕', category:'reminder', sub:'ticket_done', isRead:false, time:'2026-07-02 14:00' },
  { id:'n10', title:'【柜机授权即将到期】柜机 LK-005 授权剩余3天，请及时续期', category:'exception', sub:'auth_expire', isRead:false, time:'2026-07-02 12:00' },
];

const announcements = [
  { id:'a1', title:'版本升级', content:'1、【订单管理】新增批量分配订单功能\n2、【柜机监控】优化柜机状态面板，新增满载预警\n3、【消息中心】全新消息中心上线，支持分类筛选和一键已读\n4、【异常工单】新增自动催办提醒，超时自动升级\n5、【数据统计】全新数据大屏上线，支持自定义指标\n6、【系统优化】修复若干已知问题，提升稳定性', isRead:false, time:'2026-07-03 09:00' },
  { id:'a2', title:'版本升级', content:'1、【柜机管理】优化柜机列表加载速度\n2、【订单查询】新增多条件组合筛选', isRead:true, time:'2026-06-20 09:00' },
];

const exceptionTabs = [
  { key:'all', label:'全部' },
  { key:'locker_fault', label:'柜机故障告警' },
  { key:'storage_overtime', label:'行李超时未领取' },
  { key:'order_overtime', label:'订单超时未完成' },
  { key:'locker_full', label:'柜机即将满载' },
  { key:'auth_expire', label:'柜机授权即将到期' },
];
const reminderTabs = [
  { key:'all', label:'全部' },
  { key:'order_assign', label:'订单分配' },
  { key:'order_transfer', label:'订单转移' },
  { key:'storage_expire', label:'行李寄存到期提醒' },
  { key:'refund_review', label:'退款申请待审核' },
  { key:'ticket_done', label:'异常件处理完成' },
];

/* ===== STATE ===== */
let activeTab = 'notification';
let filterEx = 'all', filterRm = 'all', unreadOnly = false;
let page = 1, pageSize = 10;

/* ===== COMPUTED ===== */
function getFiltered(){
  if(activeTab==='announcement') return announcements;
  let data = notifications.slice();
  if(filterEx!=='all' || filterRm!=='all'){
    data = data.filter(n => {
      const mEx = filterEx==='all' || (n.category==='exception' && n.sub===filterEx);
      const mRm = filterRm==='all' || (n.category==='reminder' && n.sub===filterRm);
      return mEx || mRm;
    });
  }
  if(unreadOnly) data = data.filter(n=>!n.isRead);
  return data;
}
function getUnreadCount(data){ return data.filter(n=>!n.isRead).length; }

/* ===== RENDER ===== */
function renderAll(){
  const data = getFiltered();
  const totalPages = Math.ceil(data.length/pageSize)||1;
  if(page>totalPages) page=totalPages;
  const pageData = activeTab==='announcement' ? data : data.slice((page-1)*pageSize, page*pageSize);

  // Update badges
  const nUnread = notifications.filter(n=>!n.isRead).length;
  const aUnread = announcements.filter(a=>!a.isRead).length;
  document.getElementById('badgeNotif').textContent = nUnread;
  document.getElementById('badgeNotif').style.display = nUnread>0?'flex':'none';
  document.getElementById('badgeAnnounce').textContent = aUnread;
  document.getElementById('badgeAnnounce').style.display = aUnread>0?'flex':'none';

  // List header
  document.getElementById('listTitle').textContent = activeTab==='notification'?'消息列表':'系统公告';
  document.getElementById('listCount').textContent = '共计 '+data.length+' 条消息';
  document.getElementById('listActions').style.display = activeTab==='notification'?'flex':'none';
  const unreadInFiltered = getUnreadCount(data);
  document.getElementById('markAllCount').textContent = unreadInFiltered;
  document.getElementById('markAllBtn').style.display = unreadInFiltered>0?'block':'none';

  // Filters visibility
  document.getElementById('filterSection').style.display = activeTab==='notification'?'block':'none';

  // Message list
  const listEl = document.getElementById('msgList');
  if(pageData.length===0){
    listEl.innerHTML = '<div class="flex flex-col items-center py-20 text-[14px] text-ink-muted gap-3"><i data-lucide="inbox" class="w-[48px] h-[48px] opacity-30"></i><p>暂无消息</p></div>';
  } else {
    let html = '';
    pageData.forEach(m => {
      const cls = m.isRead?'read':'';
      html += '<div class="msg-item flex items-start gap-3 '+cls+'" onclick="markRead(\''+m.id+'\')">';
      html += '<div class="msg-dot"></div>';
      html += '<div class="flex-1 min-w-0"><div class="text-[14px] msg-title '+(m.isRead?'text-ink-muted font-normal':'text-ink-title font-medium')+'">'+m.title+'</div></div>';
      html += '<span class="text-[12px] text-ink-muted font-mono flex-shrink-0">'+m.time+'</span>';
      html += '</div>';
    });
    listEl.innerHTML = html;
  }

  // Pagination
  document.getElementById('pageInfo').textContent = '第 '+page+'/'+totalPages+' 页';
  document.getElementById('prevBtn').disabled = page<=1;
  document.getElementById('nextBtn').disabled = page>=totalPages;
  document.getElementById('paginationBar').style.display = activeTab==='notification'?'flex':'none';
}

function renderFilters(){
  let h = '';
  exceptionTabs.forEach(t=>{
    const count = t.key==='all'?notifications.filter(n=>n.category==='exception'&&!n.isRead).length:notifications.filter(n=>n.sub===t.key&&!n.isRead).length;
    h += '<span class="filter-chip'+(filterEx===t.key?' active':'')+'" onclick="setFilter(\'ex\',\''+t.key+'\')">'+t.label+(count>0?' <span class="chip-badge">'+count+'</span>':'')+'</span>';
  });
  document.getElementById('exceptionFilters').innerHTML = h;
  h = '';
  reminderTabs.forEach(t=>{
    const count = t.key==='all'?notifications.filter(n=>n.category==='reminder'&&!n.isRead).length:notifications.filter(n=>n.sub===t.key&&!n.isRead).length;
    h += '<span class="filter-chip'+(filterRm===t.key?' active':'')+'" onclick="setFilter(\'rm\',\''+t.key+'\')">'+t.label+(count>0?' <span class="chip-badge">'+count+'</span>':'')+'</span>';
  });
  document.getElementById('reminderFilters').innerHTML = h;
}

function setFilter(type,key){
  if(type==='ex') filterEx = key; else filterRm = key;
  page = 1; applyFilters();
}
function applyFilters(){
  unreadOnly = document.getElementById('unreadOnly').checked;
  page = 1; renderAll(); renderFilters();
}
function switchTab(tab){
  activeTab = tab; filterEx = 'all'; filterRm = 'all'; unreadOnly = false; page = 1;
  document.getElementById('unreadOnly').checked = false;
  document.getElementById('tabNotification').style.cssText = tab==='notification'?'color:#0066FF;font-weight:600;border-bottom-color:#0066FF;':'color:#6E7685;font-weight:400;border-bottom-color:transparent;';
  document.getElementById('tabAnnounce').style.cssText = tab==='announcement'?'color:#0066FF;font-weight:600;border-bottom-color:#0066FF;':'color:#6E7685;font-weight:400;border-bottom-color:transparent;';
  renderAll(); renderFilters();
}
function markRead(id){
  const n = notifications.find(x=>x.id===id);
  if(n){ n.isRead=true; renderAll(); renderFilters(); return; }
  const a = announcements.find(x=>x.id===id);
  if(a){ a.isRead=true; renderAll(); }
}
function markAllRead(){
  getFiltered().forEach(n=>{ n.isRead=true; });
  renderAll(); renderFilters(); showToast('已全部标记为已读','success');
}
function prevPage(){ if(page>1){ page--; renderAll(); } }
function nextPage(){ const total=Math.ceil(getFiltered().length/pageSize)||1; if(page<total){ page++; renderAll(); } }

/* ===== MODALS ===== */
function showWechatModal(){ document.getElementById('wechatModalOverlay').classList.remove('hidden'); }
function closeWechatModal(){ document.getElementById('wechatModalOverlay').classList.add('hidden'); }

/* ===== TOAST ===== */
let tt=null;
function showToast(msg,type='info'){
  if(tt)clearTimeout(tt);
  const el=document.getElementById('toast');
  const c={info:'#1A1D24',success:'#0FC060'};
  el.textContent=msg;el.style.background=c[type]||c.info;el.style.opacity='1';
  tt=setTimeout(()=>{el.style.opacity='0';},2000);
}

/* ================================================================
   MENU SELECT — unified sidebar menu interaction handler
   - L1 without children → select + navigate
   - L1 with children    → toggle expand/collapse only (no nav)
   - L2                   → select self + parent L1 + navigate
   - Only one submenu expanded at a time
   - Clicking already-selected L2 re-navigates
   ================================================================ */
function menuSelect(el) {
  if (el.classList.contains('l1')) {
    handleL1(el);
  } else if (el.classList.contains('l2')) {
    handleL2(el);
  }
}

/* ---- L1: handle both leaf and expandable ---- */
function handleL1(el) {
  var subId = el.getAttribute('data-sub');
  if (subId) {
    handleL1Toggle(el, subId);
  } else {
    selectL1NoChildren(el);
  }
}

/* L1 with children — toggle expand / collapse */
function handleL1Toggle(el, subId) {
  var sub = document.getElementById(subId);
  if (!sub) return;
  var arrow = el.querySelector('.menu-arrow');
  var isExpanded = !sub.classList.contains('collapsed');

  if (isExpanded) {
    // Collapse this submenu
    sub.classList.add('collapsed');
    if (arrow) arrow.classList.remove('open');
    // Remove active-l1 only if no child is selected
    if (!sub.querySelector('.menu-item.active-l2')) {
      el.classList.remove('active-l1');
    }
  } else {
    // Collapse all other submenus first (exclusive expand)
    collapseAllExcept(subId);
    // Expand this submenu
    sub.classList.remove('collapsed');
    if (arrow) arrow.classList.add('open');
    // If a child was previously selected, restore parent active state
    if (sub.querySelector('.menu-item.active-l2')) {
      el.classList.add('active-l1');
    }
  }
}

/* L1 without children — select and navigate */
function selectL1NoChildren(el) {
  collapseAllExcept(null);
  clearAllActive();
  el.classList.add('active-l1');
  var page = el.getAttribute('data-page');
  navigateToPage(page);
}

/* ---- L2: select self + parent, then navigate ---- */
function handleL2(el) {
  var parentSub = el.closest('.submenu');
  var parentSubId = parentSub ? parentSub.id : null;

  // Keep parent submenu expanded, collapse others
  collapseAllExcept(parentSubId);

  // Ensure parent submenu is expanded
  if (parentSub && parentSub.classList.contains('collapsed')) {
    parentSub.classList.remove('collapsed');
  }

  // Clear all, then set self + parent active
  clearAllActive();
  el.classList.add('active-l2');

  var parentL1 = findParentL1BySubId(parentSubId);
  if (parentL1) {
    parentL1.classList.add('active-l1');
    var arrow = parentL1.querySelector('.menu-arrow');
    if (arrow) arrow.classList.add('open');
  }

  // Navigate
  var page = el.getAttribute('data-page');
  navigateToPage(page);
}

/* ---- Helpers ---- */

/** Collapse all submenus except the one with keepSubId */
function collapseAllExcept(keepSubId) {
  document.querySelectorAll('.submenu').forEach(function(sub) {
    if (sub.id === keepSubId) return;
    if (sub.classList.contains('collapsed')) return;
    sub.classList.add('collapsed');
    // Reset parent L1 arrow and active state
    var l1 = findParentL1BySubId(sub.id);
    if (l1) {
      var arrow = l1.querySelector('.menu-arrow');
      if (arrow) arrow.classList.remove('open');
      if (!sub.querySelector('.menu-item.active-l2')) {
        l1.classList.remove('active-l1');
      }
    }
  });
}

/** Remove all active-l1 / active-l2 classes */
function clearAllActive() {
  document.querySelectorAll('.menu-item').forEach(function(item) {
    item.classList.remove('active-l1', 'active-l2');
  });
}

/** Find the parent L1 element by submenu ID */
function findParentL1BySubId(subId) {
  if (!subId) return null;
  return document.querySelector('.menu-item.l1[data-sub="' + subId + '"]');
}

/** Navigate: .html → page jump; otherwise → show placeholder in content area */
function navigateToPage(page) {
  if (!page) return;
  // Guard: skip if already on this page (prevents file:// self-navigation error)
  var fname = page.split("/").pop();
  var cur = window.location.pathname.split("/").pop();
  if (fname === cur) return;
  if (page.endsWith('.html')) {
    window.location.href = page;
  } else {
    // Placeholder — render inline
    document.getElementById('mainContent').innerHTML =
      '<div class="p-4">' +
      '<div class="bg-white rounded-lg border border-line p-5 md:p-6">' +
      '<h2 class="text-[16px] font-semibold text-ink-title mb-2">' + page + '</h2>' +
      '<p class="text-[14px] text-ink-muted">该页面开发中，敬请期待。</p>' +
      '</div></div>';
  }
}

/* ===== TOPBAR NAVIGATION ===== */
function navigate(url) {
  if (url === '#') return;
  // Guard: skip if already on this page (prevents file:// self-navigation error)
  var fname = url.split("/").pop();
  var cur = window.location.pathname.split("/").pop();
  if (fname === cur) return;
  window.location.href = url;
}

/* ===== MOBILE SIDEBAR TOGGLE ===== */
function toggleSidebar() {
  var sb = document.getElementById('sidebar');
  var overlay = document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  overlay.classList.toggle('show');
}

document.addEventListener('DOMContentLoaded',()=>{lucide.createIcons();renderAll();renderFilters();});
