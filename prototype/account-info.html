<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>账号信息 - 游寄后台管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#0066FF',hover:'#0052CC',active:'#0047B3',bg:'#E6F0FF'},ink:{title:'#1A1D24',body:'#3A3F4A',sub:'#6E7685',muted:'#9DA2AC'},line:{DEFAULT:'#DFE1E5',light:'#E8EAED',lighter:'#F0F1F3'},bg:{page:'#F7F8FA',card:'#FFFFFF',hover:'#F3F4F6'},success:{DEFAULT:'#0FC060',bg:'#E7F9F0'},warning:{DEFAULT:'#E7772D',bg:'#FDF2E9'},danger:{DEFAULT:'#D9001B',bg:'#FFE8EB'},info:{DEFAULT:'#0091D5',bg:'#E4F4FB'}},borderRadius:{DEFAULT:'4px',md:'6px',lg:'8px'},fontFamily:{sans:['-apple-system','BlinkMacSystemFont','PingFang SC','Microsoft YaHei','Hiragino Sans GB','Segoe UI','system-ui','sans-serif'],mono:['JetBrains Mono','monospace']}}}}</script>
  <style>
    body{background:#F7F8FA;}
    .info-row{display:flex;align-items:center;margin-bottom:24px;}
    .info-label{width:120px;font-size:14px;color:#6E7685;flex-shrink:0;}
    .info-value{font-size:14px;color:#3A3F4A;flex:1;}
    .anno-badge{position:absolute;top:-8px;right:-8px;width:20px;height:20px;border-radius:50%;background:#0066FF;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;transition:transform .15s;line-height:1;}
    .anno-badge:hover{transform:scale(1.2);}.anno-hidden .anno-badge{display:none;}
    @media(max-width:768px){.info-row{flex-direction:column;align-items:flex-start;margin-bottom:16px;}.info-label{width:100%;margin-bottom:6px;}}
  
.menu-item{cursor:pointer;transition:background .12s,color .12s;user-select:none;display:flex;align-items:center;gap:10px;padding:10px 16px;color:#1A1D24;font-size:13px;position:relative;text-decoration:none;}
.menu-item:hover{background:#F3F4F6;}
.menu-item.l1{padding-left:20px;font-weight:500;}
.menu-item.l2{padding-left:52px;}
.menu-item.active-l1{color:#0066FF;}
.menu-item.active-l2{background:#E6F0FF;color:#0066FF;font-weight:500;}
.menu-ico{width:28px;height:28px;border-radius:7px;border:1.5px solid #D0D3D9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#6E7685;flex-shrink:0;transition:all .15s;}
.active-l1 .menu-ico{background:#0066FF;border-color:#0066FF;color:#fff;}
.menu-arrow{font-size:10px;color:#9DA2AC;margin-left:auto;transition:transform .2s;flex-shrink:0;}
.menu-arrow.open{transform:rotate(180deg);}
.submenu{overflow:hidden;transition:max-height .25s ease,opacity .2s;}
.submenu.collapsed{max-height:0!important;opacity:0;}

</style>
</head>
<body class="font-sans flex flex-col h-screen overflow-hidden">

<!-- ===== TOP BAR ===== -->
<header class="h-14 bg-white border-b border-line flex items-center px-6 flex-shrink-0">
<div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'"><div class="w-8 h-8 rounded bg-primary flex items-center justify-center"><span class="text-white font-bold text-sm">游</span></div><span class="text-[15px] font-semibold text-ink-title">游寄后台管理系统</span></div>
<div class="ml-auto flex items-center gap-5">
<a href="task-center.html" class="relative flex items-center text-ink-sub hover:text-primary transition-colors no-underline" title="任务列表"><i data-lucide="clipboard-list" class="w-[18px] h-[18px]"></i></a>
<a href="message-center.html" class="relative flex items-center text-ink-sub hover:text-primary transition-colors no-underline" title="消息中心"><i data-lucide="bell" class="w-[18px] h-[18px]"></i></a>
<a href="account-info.html" class="flex items-center gap-1.5 text-ink-sub hover:text-primary transition-colors no-underline" title="账号信息"><i data-lucide="user" class="w-[18px] h-[18px]"></i></a>
</div>
</header>

<!-- ===== MAIN ===== -->
<div class="flex flex-1 min-h-0">
<aside id="sidebar" class="w-[220px] bg-white border-r border-line flex flex-col flex-shrink-0 overflow-y-auto py-2">
<div class="menu-item l1 js-select-l1" data-label="工作台">
<div class="menu-ico"><i data-lucide="layout-dashboard" class="w-[15px] h-[15px]"></i></div>工作台
</div>
<div class="menu-item l1 js-toggle-sub" data-target="sub-orders">
<div class="menu-ico"><i data-lucide="package" class="w-[15px] h-[15px]"></i></div>订单管理<span class="menu-arrow">▼</span>
</div>
<div class="submenu collapsed" id="sub-orders" style="max-height:400px;">
<a  class="menu-item l2 no-underline" style="color:inherit;">全部订单</a>
<a  class="menu-item l2 no-underline" style="color:inherit;">异常工单</a>
</div>
<div class="menu-item l1 js-select-l1" data-label="柜机监控">
<div class="menu-ico"><i data-lucide="monitor" class="w-[15px] h-[15px]"></i></div>柜机监控
</div>
<div class="menu-item l1 js-toggle-sub active-l1" data-target="sub-settings">
<div class="menu-ico"><i data-lucide="settings" class="w-[15px] h-[15px]"></i></div>系统设置<span class="menu-arrow open">▼</span>
</div>
<div class="submenu" id="sub-settings" style="max-height:400px;">
<a href="member-management.html" class="menu-item l2 no-underline" style="color:inherit;">成员管理</a>
<a href="department-management.html" class="menu-item l2 no-underline" style="color:inherit;">部门管理</a>
<a href="role-management.html" class="menu-item l2 no-underline" style="color:inherit;">角色管理</a>
<a href="account-info.html" class="menu-item l2 active-l2 no-underline" style="color:inherit;">账号信息</a>
<a href="message-settings.html" class="menu-item l2 no-underline" style="color:inherit;">消息设置</a>
</div>
<a href="task-center.html" class="menu-item l1 no-underline" style="color:inherit;">
<div class="menu-ico"><i data-lucide="clipboard-list" class="w-[15px] h-[15px]"></i></div>任务列表
</a>
<a href="message-center.html" class="menu-item l1 no-underline" style="color:inherit;">
<div class="menu-ico"><i data-lucide="bell" class="w-[15px] h-[15px]"></i></div>消息中心
</a>

</aside>
<main class="max-w-[720px] mx-auto px-4 py-6">
  <div class="bg-white rounded-lg border border-line p-8 shadow-[0_2px_4px_rgba(0,0,0,.04)]">

    <!-- Avatar -->
    <div class="mb-8 relative">
      <span class="anno-badge" data-anno="1" >1</span>
      <div class="w-20 h-20 rounded-full bg-line-lighter flex items-center justify-center ml-0">
        <i data-lucide="user" class="w-10 h-10 text-ink-muted"></i>
      </div>
    </div>

    <!-- Info List -->
    <div class="max-w-[560px] relative">
      <span class="anno-badge" data-anno="2" >2</span>
      <div style="margin-top:28px;">

        <div class="info-row"><span class="info-label">成员名称</span><span class="info-value">张伟</span></div>
        <div class="info-row"><span class="info-label">成员ID</span><span class="info-value font-mono text-[13px]">2312312</span></div>
        <div class="info-row"><span class="info-label">企业信息</span><span class="info-value">杭州游寄科技有限公司</span></div>
        <div class="info-row"><span class="info-label">企业ID</span><span class="info-value font-mono text-[13px]">12312312</span></div>
        <div class="info-row"><span class="info-label">所属角色</span><span class="info-value">超级管理员、运营主管</span></div>
        <div class="info-row"><span class="info-label">入职时间</span><span class="info-value">2025-08-08 <span class="text-ink-muted ml-4">工龄 330天</span></span></div>
        <div class="info-row"><span class="info-label">绑定手机号</span><span class="info-value font-mono text-[13px]">139****0001</span></div>
        <div class="info-row"><span class="info-label">登录密码</span><span class="info-value font-mono text-[13px] tracking-widest">···········</span></div>

      </div>
    </div>

    <!-- Edit button -->
    <div class="mt-8 pt-6 border-t border-line relative">
      <span class="anno-badge" data-anno="3" >3</span>
      <button class="inline-flex items-center gap-2 h-8 px-4 text-[13px] font-medium rounded bg-primary text-white border-none cursor-pointer hover:bg-primary-hover transition-colors ml-0" onclick="showToast('功能开发中，敬请期待','info')">
        <i data-lucide="edit-3" class="w-[14px] h-[14px]"></i> 修改信息
      </button>
    </div>

  </div>
</main>
</div><!-- /flex wrapper -->


<!-- ===== TOAST ===== -->
</div>
<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-lg text-white text-[13px] font-medium z-[200] opacity-0 transition-opacity duration-300 pointer-events-none whitespace-nowrap" style="background:#1A1D24;"></div>

<!-- ===== ANNOTATION TOGGLE ===== -->
<div id="annoToggleWrap" class="fixed z-[150] select-none" style="right:8px;top:120px;cursor:grab;" onmousedown="startDragToggle(event)">
<div class="flex items-center gap-1 px-2.5 py-1.5 rounded-full text-[11px] font-medium bg-white/90 backdrop-blur text-primary border border-primary/30 hover:bg-primary-bg hover:border-primary/60 transition-colors cursor-pointer shadow-sm">
<i data-lucide="eye" id="annoToggleIcon" class="w-[13px] h-[13px]"></i>
<span id="annoToggleLabel">标注</span>
</div>
</div>
<div id="annoModal" class="hidden fixed z-[300]" style="top:50%;left:50%;transform:translate(-50%,-50%);">
<div class="bg-white rounded-lg p-6 w-[480px] max-w-[90vw] max-h-[70vh] overflow-y-auto relative" style="box-shadow:0 12px 40px rgba(0,0,0,.18);" onclick="event.stopPropagation()">
<div class="flex items-center gap-2 mb-4 select-none" id="annoDragHandle" style="cursor:grab;" onmousedown="startDragModal(event)" title="长按拖拽移动弹窗">
<i data-lucide="grip-horizontal" class="w-[16px] h-[16px] text-ink-muted flex-shrink-0" style="opacity:.4;"></i>
<h3 id="annoModalTitle" class="text-[16px] font-semibold text-ink-title"></h3>

<button onclick="closeAnnoModal()" class="w-8 h-8 flex items-center justify-center rounded hover:bg-bg-hover text-ink-muted" style="position:absolute;top:12px;right:12px;z-index:10;"><i data-lucide="x" class="w-[20px] h-[20px]"></i></button>
</div>
<ul id="annoModalBody" class="text-[14px] text-ink-body leading-relaxed space-y-2"></ul>
</div>
</div></div>

<script>
let toastTimer=null;
function showToast(msg,type='info'){
  if(toastTimer)clearTimeout(toastTimer);
  const el=document.getElementById('toast');
  const c={info:{bg:'#1A1D24',c:'#fff'},success:{bg:'#0FC060',c:'#fff'},warning:{bg:'#E7772D',c:'#fff'}};
  const t=c[type]||c.info;el.textContent=msg;el.style.background=t.bg;el.style.color=t.c;el.style.opacity='1';
  toastTimer=setTimeout(()=>{el.style.opacity='0';},2500);
}

const annotations={
  1:{title:'成员头像',desc:['触发：页面加载后展示','响应：显示当前登录成员的头像（80px圆形）','规则：暂不支持自定义头像，显示默认User图标占位','样式：浅灰底色 + ink-muted 色图标']},
  2:{title:'账号信息列表',desc:['成员名称/ID：当前登录成员的基本标识','企业信息/ID：所属企业名称及ID（mono字体）','所属角色：该成员被分配的角色，多个角色以"、"分隔','入职时间+工龄：入职日期 + 自动计算的工龄天数','绑定手机号：脱敏显示（139****0001）','登录密码：掩码显示，不可查看明文']},
  3:{title:'修改信息按钮',desc:['触发：点击"修改信息"按钮','响应：弹出 toast 提示"功能开发中，敬请期待"','规则：原型阶段不实现完整修改流程']},
};

let annoVisible=true;
document.getElementById('annoToggleWrap').addEventListener('click',function(){
  annoVisible=!annoVisible;
  if(annoVisible){document.body.classList.remove('anno-hidden');document.getElementById('annoToggleLabel').textContent='标注';document.getElementById('annoToggleIcon').setAttribute('data-lucide','eye');lucide.createIcons({attrs:{class:'w-[13px] h-[13px]'}});}
  else{document.body.classList.add('anno-hidden');document.getElementById('annoToggleLabel').textContent='标注';document.getElementById('annoToggleIcon').setAttribute('data-lucide','eye-off');lucide.createIcons({attrs:{class:'w-[13px] h-[13px]'}});}
  lucide.createIcons({attrs:{class:'w-[14px] h-[14px]'}});
});
document.querySelectorAll('.anno-badge').forEach(badge=>{
  badge.addEventListener('click',function(e){
    e.stopPropagation();
    const id=this.getAttribute('data-anno');
    const a=annotations[id];if(!a)return;
    document.getElementById('annoModalTitle').textContent='#'+id+' '+a.title;
    document.getElementById('annoModalBody').innerHTML=a.desc.map(d=>'<li class="flex items-start gap-2"><span class="text-primary font-bold flex-shrink-0">•</span><span>'+d+'</span></li>').join('');
    document.getElementById('annoModal').classList.remove('hidden');
  });
});

/* ===== DRAG: Annotation Modal ===== */
let dragModal = null, dragOffX = 0, dragOffY = 0, dragStartTime = 0, dragActive = false;
function startDragModal(e){
  if(e.target.closest('button')) return;
  dragStartTime = Date.now();
  dragActive = false;
  const modal = document.getElementById('annoModal');
  if(!modal) return;
  document.addEventListener('mousemove', onDragModal);
  document.addEventListener('mouseup', stopDragModal);
  dragOffX = e.clientX - modal.offsetLeft;
  dragOffY = e.clientY - modal.offsetTop;
}
function onDragModal(e){
  if(Date.now() - dragStartTime < 200) return;
  dragActive = true;
  const modal = document.getElementById('annoModal');
  if(!modal) return;
  modal.style.left = (e.clientX - dragOffX) + 'px';
  modal.style.top = (e.clientY - dragOffY) + 'px';
  modal.style.transform = 'none';
  document.getElementById('annoDragHandle').style.cursor = 'grabbing';
}
function stopDragModal(){
  document.removeEventListener('mousemove', onDragModal);
  document.removeEventListener('mouseup', stopDragModal);
  if(document.getElementById('annoDragHandle'))
    document.getElementById('annoDragHandle').style.cursor = 'grab';
}

/* ===== DRAG: Toggle Button ===== */
let dragToggle = null, dragToggleY = 0, dragToggleActive = false, dragToggleMoved = false;
function startDragToggle(e){
  if(e.target.closest('button') && e.target.closest('#annoToggleWrap')) return;
  dragToggleActive = true; dragToggleMoved = false;
  dragToggleY = e.clientY;
  document.addEventListener('mousemove', onDragToggle);
  document.addEventListener('mouseup', stopDragToggle);
  e.preventDefault();
}
function onDragToggle(e){
  if(Math.abs(e.clientY - dragToggleY) < 5) return;
  dragToggleMoved = true;
  const wrap = document.getElementById('annoToggleWrap');
  if(!wrap) return;
  let newTop = e.clientY - 20;
  newTop = Math.max(60, Math.min(window.innerHeight - 60, newTop));
  wrap.style.top = newTop + 'px';
  wrap.style.right = '8px';
  wrap.style.cursor = 'grabbing';
}
function stopDragToggle(e){
  document.removeEventListener('mousemove', onDragToggle);
  document.removeEventListener('mouseup', stopDragToggle);
  if(document.getElementById('annoToggleWrap')){
    document.getElementById('annoToggleWrap').style.cursor = 'grab';
    document.getElementById('annoToggleWrap').dataset.dragging = dragToggleMoved ? '1' : '';
    if(dragToggleMoved) setTimeout(function(){ document.getElementById('annoToggleWrap').dataset.dragging = ''; }, 100);
  }
}
function closeAnnoModal(){document.getElementById('annoModal').classList.add('hidden');}
document.addEventListener('click',function(e){
  var m=document.getElementById('annoModal');
  if(!m||m.classList.contains('hidden'))return;
  if(!m.contains(e.target))closeAnnoModal();
});
document.addEventListener('click',function(e){
  var modal = document.getElementById('annoModal');
  if(!modal || modal.classList.contains('hidden')) return;
  if(!modal.contains(e.target)) closeAnnoModal();
});

document.addEventListener('DOMContentLoaded',()=>{lucide.createIcons();});


/* ===== SIDEBAR MENU ===== */
(function(){
  var sb = document.getElementById('sidebar');
  if(!sb) return;
  sb.addEventListener('click', function(e){
    var el = e.target.closest('.js-toggle-sub');
    if(!el) return;
    var targetId = el.getAttribute('data-target');
    var sub = document.getElementById(targetId);
    if(!sub) return;
    var arrow = el.querySelector('.menu-arrow');
    if(sub.classList.contains('collapsed')){
      sub.classList.remove('collapsed');
      if(arrow) arrow.classList.add('open');
    } else {
      sub.classList.add('collapsed');
      if(arrow) arrow.classList.remove('open');
    }
  });
})();

</script>
</body>
</html>
