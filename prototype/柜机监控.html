<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>柜机监控 - 游寄后台管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#0066FF',hover:'#0052CC',active:'#0047B3',bg:'#E6F0FF'},ink:{title:'#1A1D24',body:'#3A3F4A',sub:'#6E7685',muted:'#9DA2AC'},line:{DEFAULT:'#DFE1E5',light:'#E8EAED',lighter:'#F0F1F3'},bg:{page:'#F7F8FA',card:'#FFFFFF',hover:'#F3F4F6'},success:{DEFAULT:'#0FC060',bg:'#E7F9F0'},warning:{DEFAULT:'#E7772D',bg:'#FDF2E9'},danger:{DEFAULT:'#D9001B',bg:'#FFE8EB'},info:{DEFAULT:'#0091D5',bg:'#E4F4FB'}},borderRadius:{DEFAULT:'4px',md:'6px',lg:'8px'},fontFamily:{sans:['-apple-system','BlinkMacSystemFont','PingFang SC','Microsoft YaHei','Hiragino Sans GB','Segoe UI','system-ui','sans-serif'],mono:['JetBrains Mono','monospace']}}}}</script>
  <style>
    body{overflow:hidden;}
    /* Sidebar */
    .menu-item{cursor:pointer;transition:background .12s,color .12s;user-select:none;display:flex;align-items:center;gap:10px;padding:10px 16px;color:#1A1D24;font-size:13px;position:relative;text-decoration:none;}
    .menu-item:hover{background:#F3F4F6;}
    .menu-item.l1{padding-left:20px;font-weight:500;}
    .menu-item.l2{padding-left:64px;font-size:13px;}
    .menu-item.active-l1{color:#0066FF;}
    .menu-item.active-l2{background:#E6F0FF;color:#0066FF;font-weight:500;}
    .menu-ico{width:28px;height:28px;border-radius:7px;border:1.5px solid #D0D3D9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#6E7685;flex-shrink:0;transition:all .15s;}
    .active-l1 .menu-ico{background:#0066FF;border-color:#0066FF;color:#fff;}
    .menu-arrow{font-size:10px;color:#9DA2AC;margin-left:auto;transition:transform .2s;flex-shrink:0;}
    .menu-arrow.open{transform:rotate(180deg);}
    .submenu{overflow:hidden;transition:max-height .25s ease,opacity .2s;}
    .submenu.collapsed{max-height:0!important;opacity:0;}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:32px;padding:0 14px;font-size:13px;font-weight:500;border-radius:4px;border:1px solid transparent;cursor:pointer;transition:all .15s;outline:none;}
    .btn-primary{background:#0066FF;color:#fff;border-color:#0066FF;}
    .btn-primary:hover{background:#0052CC;}
    .btn-default{background:#fff;color:#3A3F4A;border-color:#DFE1E5;}
    .btn-default:hover{border-color:#0066FF;color:#0066FF;}
    .btn-sm{height:28px;padding:0 10px;font-size:12px;}
    /* KPI card */
    .kpi-card{border-radius:6px;border:1px solid #E8EAED;background:#fff;padding:14px 18px;transition:box-shadow .15s;cursor:pointer;}
    .kpi-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.06);}
    .kpi-card.danger-highlight{border-color:#D9001B;background:#FFFAFA;}
    /* Data table */
    .data-table{width:100%;border-collapse:collapse;font-size:13px;}
    .data-table thead th{background:#F0F1F3;color:#6E7685;font-weight:600;font-size:12px;padding:9px 12px;text-align:left;border-bottom:1px solid #DFE1E5;white-space:nowrap;}
    .data-table tbody td{padding:9px 12px;color:#3A3F4A;border-bottom:1px solid #E8EAED;}
    .data-table tbody tr{transition:background .12s;}
    .data-table tbody tr:hover{background:#F3F4F6;}
    .data-table tbody tr.row-danger{background:#FFF5F5;}
    .data-table tbody tr.row-danger:hover{background:#FFE8EB;}
    .data-table tbody tr.row-warning{background:#FFFCF5;}
    .data-table tbody tr.row-warning:hover{background:#FDF2E9;}
    /* Badge */
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500;white-space:nowrap;}
    .badge-success{color:#0FC060;background:#E7F9F0;}
    .badge-danger{color:#D9001B;background:#FFE8EB;}
    .badge-warning{color:#E7772D;background:#FDF2E9;}
    .badge-muted{color:#9DA2AC;background:#F0F1F3;}
    /* Filter */
    .filter-select{font-family:inherit;font-size:13px;height:32px;padding:0 28px 0 10px;border-radius:4px;border:1px solid #DFE1E5;color:#3A3F4A;background:#fff;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;}
    .filter-input{font-family:inherit;font-size:13px;height:32px;padding:0 10px;border-radius:4px;border:1px solid #DFE1E5;color:#3A3F4A;outline:none;width:200px;}
    .filter-input:focus{border-color:#0066FF;box-shadow:0 0 0 2px rgba(0,102,255,.12);}
    .filter-input::placeholder{color:#9DA2AC;}
    .select-wrap{position:relative;display:inline-flex;align-items:center;}
    .select-wrap::after{content:'▼';position:absolute;right:10px;font-size:8px;color:#9DA2AC;pointer-events:none;}
    /* Topbar */
    .topbar-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:#F3F4F6;cursor:pointer;transition:background .15s;position:relative;border:none;outline:none;}
    .topbar-btn:hover{background:#E6F0FF;}
    .topbar-btn:hover svg{stroke:#0066FF;}
    .badge-dot{position:absolute;top:-2px;right:-2px;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#FF3B30;color:#fff;font-size:10px;font-weight:600;line-height:18px;text-align:center;}
    /* Drawer */
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1100;display:none;}
    .drawer-overlay.show{display:block;}
    .drawer{position:fixed;top:0;right:0;bottom:0;width:800px;max-width:100%;background:#fff;z-index:1101;box-shadow:-4px 0 24px rgba(0,0,0,.1);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s ease;}
    .drawer.open{transform:translateX(0);}
    .drawer-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid #DFE1E5;flex-shrink:0;}
    .drawer-body{flex:1;overflow-y:auto;padding:24px;}
    .drawer-footer{display:flex;align-items:center;justify-content:flex-end;gap:12px;padding:16px 24px;border-top:1px solid #DFE1E5;flex-shrink:0;}
    /* Locker grid */
    .locker-grid{display:grid;gap:4px;}
    .locker-cell{width:100%;aspect-ratio:1;border-radius:3px;cursor:pointer;transition:all .12s;position:relative;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;font-family:'JetBrains Mono',monospace;}
    .locker-cell:hover{transform:scale(1.08);z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.2);}
    .locker-cell.free{background:#0FC060;}
    .locker-cell.occupied{background:#0066FF;}
    .locker-cell.maintenance{background:#E7772D;}
    .locker-cell.disabled-cell{background:#C7CAD1;}
    /* Locker tooltip */
    .locker-tooltip{position:fixed;z-index:9999;background:#1A1D24;color:#fff;padding:8px 12px;border-radius:4px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2);}
    .locker-tooltip.show{opacity:1;}
    /* Portal annotation */
    .anno-portal-badge{position:absolute;width:20px;height:20px;border-radius:50%;background:#0066FF;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15);transition:transform .15s;line-height:1;pointer-events:auto;}
    .anno-portal-badge:hover{transform:scale(1.2);}
    .anno-hidden .anno-portal-badge{display:none;}
    /* Usage bar */
    .usage-bar{height:6px;border-radius:3px;background:#F0F1F3;overflow:hidden;}
    .usage-bar-fill{height:100%;border-radius:3px;transition:width .3s ease;}
    /* Tab toggle */
    .view-tab{padding:6px 14px;font-size:13px;color:#6E7685;cursor:pointer;border-radius:4px;transition:all .15s;white-space:nowrap;border:1px solid transparent;display:inline-flex;align-items:center;gap:5px;}
    .view-tab:hover{color:#0066FF;background:#E6F0FF;}
    .view-tab.active{background:#0066FF;color:#fff;font-weight:500;}
    /* Info row */
    .info-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #F0F1F3;}
    .info-row:last-child{border-bottom:none;}
    .info-label{width:100px;flex-shrink:0;font-size:13px;color:#6E7685;}
    .info-value{font-size:13px;color:#3A3F4A;}
    /* Sync badge */
    .sync-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#9DA2AC;padding:2px 8px;border-radius:4px;background:#F7F8FA;}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:#0FC060;}
    /* Skeleton */
    @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
    .skeleton{background:linear-gradient(90deg,#F0F1F3 25%,#E8EAED 50%,#F0F1F3 75%);background-size:800px 100%;animation:shimmer 1.5s infinite;}
    /* Responsive */
    @media(max-width:768px){
      .sidebar{display:none;}
      .sidebar.open{display:flex;position:fixed;top:56px;left:0;bottom:0;z-index:50;}
      .sidebar-overlay{display:none;}
      .sidebar-overlay.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:49;}
    }
  </style>
</head>
<body class="font-sans flex flex-col h-screen">

<!-- ===== TOP BAR ===== -->
<header class="h-14 bg-white border-b border-line flex items-center px-4 md:px-6 flex-shrink-0 gap-3">
  <button class="topbar-btn md:hidden" onclick="toggleSidebar()" title="菜单">
    <i data-lucide="menu" class="w-[18px] h-[18px]"></i>
  </button>
  <div class="flex items-center gap-2 cursor-pointer flex-shrink-0" onclick="navigate('index.html')">
    <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center"><span class="text-white font-bold text-sm">游</span></div>
    <span class="text-[15px] font-semibold text-ink-title hidden sm:block">游寄后台管理系统</span>
  </div>
  <div class="ml-auto flex items-center gap-3 md:gap-5">
    <button class="topbar-btn" title="任务列表" onclick="navigate('任务中心.html')">
      <i data-lucide="clipboard-list" class="w-[18px] h-[18px]"></i>
      <span class="badge-dot" id="taskBadge" style="display:none;">0</span>
    </button>
    <button class="topbar-btn" title="消息中心" onclick="navigate('消息中心.html')">
      <i data-lucide="bell" class="w-[18px] h-[18px]"></i>
      <span class="badge-dot" id="msgBadge">5</span>
    </button>
    <button class="topbar-btn" title="账号信息" onclick="navigate('账号信息.html')">
      <i data-lucide="user" class="w-[18px] h-[18px]"></i>
    </button>
  </div>
</header>

<!-- ===== BODY: SIDEBAR + CONTENT ===== -->
<div class="flex flex-1 min-h-0">
  <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar w-[220px] bg-white border-r border-line flex flex-col flex-shrink-0 overflow-y-auto py-2">
    <!-- 工作台 -->
    <div class="menu-item l1" data-page="工作台.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="layout-dashboard" class="w-[15px] h-[15px]"></i></div>工作台
    </div>

    <!-- 数据概览 -->
    <div class="menu-item l1" data-page="数据概览.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="bar-chart-3" class="w-[15px] h-[15px]"></i></div>数据概览
    </div>

    <!-- 订单管理 -->
    <div class="menu-item l1" data-page="订单管理.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="package" class="w-[15px] h-[15px]"></i></div>订单管理
    </div>

    <!-- 异常工单 -->
    <div class="menu-item l1" data-page="异常工单.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="alert-triangle" class="w-[15px] h-[15px]"></i></div>异常工单
    </div>

    <!-- 柜机监控（当前页） -->
    <div class="menu-item l1 active-l1" data-page="柜机监控.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="monitor" class="w-[15px] h-[15px]"></i></div>柜机监控
    </div>

    <!-- 对账中心 -->
    <div class="menu-item l1" data-page="对账中心.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="file-text" class="w-[15px] h-[15px]"></i></div>对账中心
    </div>

    <!-- 运营配置 -->
    <div class="menu-item l1" data-page="运营配置.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="sliders-horizontal" class="w-[15px] h-[15px]"></i></div>运营配置
    </div>

    <!-- 系统设置（含二级菜单） -->
    <div class="menu-item l1" data-sub="sub-settings" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="settings" class="w-[15px] h-[15px]"></i></div>系统设置<span class="menu-arrow">▼</span>
    </div>
    <div class="submenu collapsed" id="sub-settings" style="max-height:400px;">
      <div class="menu-item l2" data-page="成员管理.html" onclick="menuSelect(this)">成员管理</div>
      <div class="menu-item l2" data-page="部门管理.html" onclick="menuSelect(this)">部门管理</div>
      <div class="menu-item l2" data-page="角色管理.html" onclick="menuSelect(this)">角色管理</div>
      <div class="menu-item l2" data-page="消息设置.html" onclick="menuSelect(this)">消息设置</div>
      <div class="menu-item l2" data-page="账号信息.html" onclick="menuSelect(this)">账号信息</div>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="flex-1 bg-bg-page overflow-y-auto" id="mainContent">
    <div class="p-4">

      <!-- ===== 区块A: 视图切换 + 同步/刷新（单行） ===== -->
      <div class="bg-white rounded-lg border border-line p-5 md:p-6 mb-4">
        <div class="flex items-center justify-between flex-wrap gap-3">
          <!-- 视图切换 -->
          <div class="flex items-center gap-2" data-anno="3">
            <button class="view-tab active" id="tabList" onclick="switchView('list')">
              <i data-lucide="list" class="w-[14px] h-[14px]"></i> 列表视图
            </button>
            <button class="view-tab" id="tabMap" onclick="switchView('map')">
              <i data-lucide="map" class="w-[14px] h-[14px]"></i> 地图视图
            </button>
          </div>
          <div class="flex items-center gap-3" data-anno="2">
            <span class="sync-badge">
              <span class="sync-dot" id="syncDot"></span>
              <span id="syncTime">最近同步：--</span>
            </span>
            <button class="btn btn-default btn-sm" onclick="refreshData()">
              <i data-lucide="refresh-cw" class="w-[13px] h-[13px]"></i> 刷新
            </button>
          </div>
        </div>
      </div>

      <!-- ===== LIST VIEW ===== -->
      <div id="listView">

        <!-- ===== 区块B: 状态概览条 ===== -->
        <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 mb-4" data-anno="4">
          <div class="kpi-card" id="kpiTotal">
            <div class="text-[12px] text-ink-sub mb-1">柜机总数</div>
            <div class="text-[24px] font-semibold text-ink-title font-mono" id="kpiTotalVal">--</div>
          </div>
          <div class="kpi-card" id="kpiOnline">
            <div class="text-[12px] text-success mb-1">在线</div>
            <div class="text-[24px] font-semibold text-success font-mono" id="kpiOnlineVal">--</div>
          </div>
          <div class="kpi-card" id="kpiOffline">
            <div class="text-[12px] text-danger mb-1">离线</div>
            <div class="text-[24px] font-semibold text-danger font-mono" id="kpiOfflineVal">--</div>
          </div>
          <div class="kpi-card" id="kpiFull">
            <div class="text-[12px] text-warning mb-1">满柜</div>
            <div class="text-[24px] font-semibold text-warning font-mono" id="kpiFullVal">--</div>
          </div>
          <div class="kpi-card" id="kpiUsage">
            <div class="text-[12px] text-ink-sub mb-1">格口使用率</div>
            <div class="text-[24px] font-semibold text-ink-title font-mono" id="kpiUsageVal">--</div>
            <div class="usage-bar mt-2"><div class="usage-bar-fill bg-primary" id="usageBarFill" style="width:0%"></div></div>
          </div>
        </div>

        <!-- ===== 区块C: 筛选/搜索 ===== -->
        <div class="bg-white rounded-lg border border-line p-4 mb-4" data-anno="5">
          <div class="flex flex-wrap items-center gap-3">
            <div class="select-wrap">
              <select class="filter-select" id="filterLocation" onchange="applyFilters()">
                <option value="">全部网点</option>
              </select>
            </div>
            <div class="select-wrap">
              <select class="filter-select" id="filterStatus" onchange="applyFilters()">
                <option value="">全部状态</option>
                <option value="online">在线</option>
                <option value="offline">离线</option>
                <option value="disabled">停用</option>
                <option value="full">满柜</option>
              </select>
            </div>
            <input type="text" class="filter-input" id="filterSearch" placeholder="柜机名称 / 机柜编码" oninput="applyFilters()">
            <button class="btn btn-default btn-sm" onclick="resetFilters()">
              <i data-lucide="rotate-ccw" class="w-[13px] h-[13px]"></i> 重置
            </button>
            <span class="text-[12px] text-ink-muted ml-auto" id="filterCount">共 0 条</span>
          </div>
        </div>

        <!-- ===== 区块D: 柜机列表表格 ===== -->
        <div class="bg-white rounded-lg border border-line p-5 md:p-6 mb-4" data-anno="6">
          <div class="overflow-x-auto">
            <table class="data-table" id="cabinetTable">
              <thead>
                <tr>
                  <th>机柜编码</th>
                  <th>机柜名称</th>
                  <th>网点</th>
                  <th>位置</th>
                  <th>柜机状态</th>
                  <th>格口占用</th>
                  <th>各柜型可用</th>
                  <th>最近上线/离线时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="cabinetTbody"></tbody>
            </table>
          </div>
          <!-- 空状态 -->
          <div id="emptyState" class="hidden flex flex-col items-center justify-center py-16 text-center">
            <i data-lucide="monitor-off" class="w-[48px] h-[48px] text-ink-muted mb-3"></i>
            <p class="text-[14px] text-ink-sub mb-1">暂无匹配的柜机</p>
            <p class="text-[12px] text-ink-muted">请调整筛选条件或重置</p>
          </div>
          <!-- 加载骨架屏 -->
          <div id="loadingSkeleton" class="hidden space-y-3 py-2">
            <div class="skeleton h-10 rounded w-full"></div>
            <div class="skeleton h-10 rounded w-full"></div>
            <div class="skeleton h-10 rounded w-full"></div>
            <div class="skeleton h-10 rounded w-full"></div>
            <div class="skeleton h-10 rounded w-full"></div>
          </div>
        </div>

        <!-- ===== 区块E: 分页 ===== -->
        <div class="flex items-center justify-between flex-wrap gap-4 bg-white rounded-lg border border-line px-5 py-3" id="pagination" data-anno="7">
          <div class="flex items-center gap-1" id="pgNav"></div>
          <div class="flex items-center gap-3">
            <span class="text-[12px] text-ink-muted" id="pgStats">共 0 条记录</span>
            <div class="select-wrap">
              <select class="filter-select" style="height:30px;font-size:12px;" id="pageSize" onchange="changePageSize()">
                <option value="10">10 条/页</option>
                <option value="15" selected>15 条/页</option>
                <option value="20">20 条/页</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== MAP VIEW (placeholder) ===== -->
      <div id="mapView" class="hidden">
        <div class="bg-white rounded-lg border border-line p-5 md:p-6" data-anno="8">
          <div class="flex flex-col items-center justify-center py-20 text-center">
            <i data-lucide="map-pin" class="w-[64px] h-[64px] text-ink-muted mb-4" style="opacity:.3;"></i>
            <h3 class="text-[16px] font-semibold text-ink-title mb-2">地图视图</h3>
            <p class="text-[13px] text-ink-sub mb-1">在地图上展示柜机分布与状态，直观看哪片区域有离线/满柜</p>
            <p class="text-[12px] text-ink-muted mb-6">依赖柜机经纬度数据（小铁接口待提供），一期暂以列表视图为主</p>
            <div class="grid grid-cols-4 gap-4 text-center max-w-[500px]">
              <div><span class="inline-block w-3 h-3 rounded-full bg-success mr-1"></span><span class="text-[12px] text-ink-sub">在线</span></div>
              <div><span class="inline-block w-3 h-3 rounded-full bg-danger mr-1"></span><span class="text-[12px] text-ink-sub">离线</span></div>
              <div><span class="inline-block w-3 h-3 rounded-full bg-warning mr-1"></span><span class="text-[12px] text-ink-sub">满柜</span></div>

/* Generate locker-level data for each cabinet */
function generateLockers(cab) {
  var lockers = [];
  var types = [];
  // Build type array
  for (var i = 0; i < cab.smallTotal; i++) types.push('S');
  for (var i = 0; i < cab.mediumTotal; i++) types.push('M');
  for (var i = 0; i < cab.largeTotal; i++) types.push('L');
  // Determine status for each locker based on free counts
  var smallFilled = cab.smallTotal - cab.smallFree;
  var mediumFilled = cab.mediumTotal - cab.mediumFree;
  var largeFilled = cab.largeTotal - cab.largeFree;
  var sCount = 0, mCount = 0, lCount = 0;
  for (var i = 0; i < types.length; i++) {
    var t = types[i];
    var status;
    if (cab.status === 'disabled') {
      status = 'disabled-cell';
    } else {
      if (t === 'S') { sCount++; status = sCount <= smallFilled ? 'occupied' : 'free'; }
      else if (t === 'M') { mCount++; status = mCount <= mediumFilled ? 'occupied' : 'free'; }
      else { lCount++; status = lCount <= largeFilled ? 'occupied' : 'free'; }
    }
    // Random maintenance (5% chance for online cabinets)
    if (cab.status === 'online' && Math.random() < 0.05) status = 'maintenance';
    lockers.push({
      id: cab.code + '-L' + String(i+1).padStart(2,'0'),
      type: t,
      status: status,
      orderNo: status === 'occupied' ? 'YK20260705' + String(Math.floor(Math.random()*9000)+1000) : null
    });
  }
  return lockers;
}

// Build cabinet data with lockers
var cabinets = rawCabinets.map(function(c) {
  c.lockers = generateLockers(c);
  c.usageRate = c.totalLockers > 0 ? Math.round(c.occupiedLockers / c.totalLockers * 100) : 0;
  return c;
});

/* ================================================================
   STATE
   ================================================================ */
var currentView = 'list';
var currentPage = 1;
var pageSize = 15;
var filteredCabinets = cabinets.slice();
var activeFilters = { location:'', status:'', search:'' };
var lastSyncTime = null;

/* ================================================================
   RENDER — List View
   ================================================================ */
function updateKPIs(list) {
  var total = list.length;
  var online = list.filter(function(c){return c.status==='online';}).length;
  var offline = list.filter(function(c){return c.status==='offline';}).length;
  var full = list.filter(function(c){return c.status==='full';}).length;
  var disabled = list.filter(function(c){return c.status==='disabled';}).length;
  var totalLockers = list.reduce(function(s,c){return s+c.totalLockers;},0);
  var occLockers = list.reduce(function(s,c){return s+c.occupiedLockers;},0);
  var usageRate = totalLockers > 0 ? Math.round(occLockers / totalLockers * 100) : 0;

  document.getElementById('kpiTotalVal').textContent = total;
  document.getElementById('kpiOnlineVal').textContent = online;
  document.getElementById('kpiOfflineVal').textContent = offline;
  document.getElementById('kpiFullVal').textContent = full;
  document.getElementById('kpiUsageVal').textContent = usageRate + '%';
  document.getElementById('usageBarFill').style.width = usageRate + '%';

  // Highlight danger KPI if offline > 0
  var kpiOff = document.getElementById('kpiOffline');
  if (offline > 0) { kpiOff.classList.add('danger-highlight'); }
  else { kpiOff.classList.remove('danger-highlight'); }

  var kpiFull = document.getElementById('kpiFull');
  if (full > 0) { kpiFull.classList.add('danger-highlight'); kpiFull.style.borderColor = '#E7772D'; kpiFull.style.background = '#FFFCF5'; }
  else { kpiFull.classList.remove('danger-highlight'); kpiFull.style.borderColor = '#E8EAED'; kpiFull.style.background = '#fff'; }
}

function getStatusBadge(status) {
  var map = {
    'online':   { cls:'badge-success', label:'在线' },
    'offline':  { cls:'badge-danger', label:'离线' },
    'disabled': { cls:'badge-muted', label:'停用' },
    'full':     { cls:'badge-warning', label:'满柜' }
  };
  var b = map[status] || map['online'];
  return '<span class="badge '+b.cls+'">'+b.label+'</span>';
}

function getRowClass(status) {
  if (status === 'offline') return 'row-danger';
  if (status === 'full') return 'row-warning';
  return '';
}

function renderTable() {
  var start = (currentPage - 1) * pageSize;
  var end = Math.min(start + pageSize, filteredCabinets.length);
  var pageData = filteredCabinets.slice(start, end);
  var tbody = document.getElementById('cabinetTbody');
  var empty = document.getElementById('emptyState');

  if (filteredCabinets.length === 0) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    document.getElementById('pagination').style.display = 'none';
    document.getElementById('filterCount').textContent = '共 0 条';
    return;
  }

  empty.classList.add('hidden');
  document.getElementById('pagination').style.display = 'flex';
  document.getElementById('filterCount').textContent = '共 ' + filteredCabinets.length + ' 条';

  var html = '';
  for (var i = 0; i < pageData.length; i++) {
    var c = pageData[i];
    var rowCls = getRowClass(c.status);
    var usageRate = c.usageRate;
    var usageColor = usageRate >= 90 ? 'text-danger' : (usageRate >= 70 ? 'text-warning' : 'text-ink-body');
    var timeDisplay = c.lastOffline
      ? '<span class="text-danger font-mono">'+c.lastOffline+'</span>'
      : '<span class="font-mono text-ink-muted">'+c.lastOnline+'</span>';

    html += '<tr class="'+rowCls+' cursor-pointer" onclick="openDetail(\''+c.code+'\')">';
    html += '<td class="font-mono text-ink-body">'+c.code+'</td>';
    html += '<td class="text-ink-body font-medium">'+c.name+'</td>';
    html += '<td class="text-ink-body">'+c.location+'</td>';
    html += '<td class="text-ink-sub text-[12px] max-w-[180px] truncate" title="'+c.address+'">'+c.address+'</td>';
    html += '<td>'+getStatusBadge(c.status)+'</td>';
    html += '<td class="font-mono '+usageColor+'">'+c.occupiedLockers+'/'+c.totalLockers+' <span class="text-[11px] text-ink-muted">('+usageRate+'%)</span></td>';
    html += '<td class="text-[12px] text-ink-body">';
    html += '<span title="小型">小</span><span class="font-mono">'+c.smallFree+'</span> ';
    html += '<span title="中型">中</span><span class="font-mono">'+c.mediumFree+'</span> ';
    html += '<span title="大型">大</span><span class="font-mono">'+c.largeFree+'</span>';
    html += '</td>';
    html += '<td class="text-[12px]">'+timeDisplay+'</td>';
    html += '<td><button class="btn btn-sm btn-default" onclick="event.stopPropagation();openDetail(\''+c.code+'\')">查看详情</button></td>';
    html += '</tr>';
  }
  tbody.innerHTML = html;
  lucide.createIcons();
}

function renderPagination() {
  var totalPages = Math.ceil(filteredCabinets.length / pageSize);
  var nav = document.getElementById('pgNav');
  var stats = document.getElementById('pgStats');
  var total = filteredCabinets.length;

  stats.textContent = '共 '+total+' 条记录　第 '+currentPage+'/'+Math.max(1,totalPages)+' 页';

  var html = '';
  // Prev
  html += '<button class="pg-btn" onclick="goPage('+(currentPage-1)+')" '+(currentPage<=1?'disabled style="color:#C7CAD1;background:#F7F8FA;cursor:not-allowed;border-color:#DFE1E5;"':'')+' style="min-width:30px;height:30px;padding:0 8px;font:500 12px inherit;color:#3A3F4A;background:#fff;border:1px solid #DFE1E5;border-radius:4px;cursor:pointer;">‹</button>';

  if (totalPages <= 7) {
    for (var i = 1; i <= totalPages; i++) {
      html += '<button class="pg-btn" onclick="goPage('+i+')" style="min-width:30px;height:30px;padding:0 8px;font:500 12px inherit;'+(i===currentPage?'background:#0066FF;border-color:#0066FF;color:#fff;':'color:#3A3F4A;background:#fff;border:1px solid #DFE1E5;')+'border-radius:4px;cursor:pointer;">'+i+'</button>';
    }
  } else {
    html += '<button class="pg-btn" onclick="goPage(1)" style="min-width:30px;height:30px;padding:0 8px;font:500 12px inherit;'+(1===currentPage?'background:#0066FF;border-color:#0066FF;color:#fff;':'color:#3A3F4A;background:#fff;border:1px solid #DFE1E5;')+'border-radius:4px;cursor:pointer;">1</button>';
    if (currentPage > 3) html += '<span style="min-width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;color:#9DA2AC;">…</span>';
    var s = Math.max(2, currentPage-1), e = Math.min(totalPages-1, currentPage+1);
    for (var i = s; i <= e; i++) {
      html += '<button class="pg-btn" onclick="goPage('+i+')" style="min-width:30px;height:30px;padding:0 8px;font:500 12px inherit;'+(i===currentPage?'background:#0066FF;border-color:#0066FF;color:#fff;':'color:#3A3F4A;background:#fff;border:1px solid #DFE1E5;')+'border-radius:4px;cursor:pointer;">'+i+'</button>';
    }
    if (currentPage < totalPages-2) html += '<span style="min-width:30px;height:30px;display:inline-flex;align-items:center;justify-content:center;color:#9DA2AC;">…</span>';
    html += '<button class="pg-btn" onclick="goPage('+totalPages+')" style="min-width:30px;height:30px;padding:0 8px;font:500 12px inherit;'+(totalPages===currentPage?'background:#0066FF;border-color:#0066FF;color:#fff;':'color:#3A3F4A;background:#fff;border:1px solid #DFE1E5;')+'border-radius:4px;cursor:pointer;">'+totalPages+'</button>';
  }
  // Next
  html += '<button class="pg-btn" onclick="goPage('+(currentPage+1)+')" '+(currentPage>=totalPages?'disabled style="color:#C7CAD1;background:#F7F8FA;cursor:not-allowed;border-color:#DFE1E5;"':'')+' style="min-width:30px;height:30px;padding:0 8px;font:500 12px inherit;color:#3A3F4A;background:#fff;border:1px solid #DFE1E5;border-radius:4px;cursor:pointer;">›</button>';
  nav.innerHTML = html;
}

function goPage(p) {
  var total = Math.ceil(filteredCabinets.length / pageSize);
  if (p < 1 || p > total) return;
  currentPage = p;
  renderTable();
  renderPagination();
  document.getElementById('mainContent').scrollTop = 0;
}

function changePageSize() {
  pageSize = parseInt(document.getElementById('pageSize').value);
  currentPage = 1;
  renderTable();
  renderPagination();
}

/* ================================================================
   FILTERS
   ================================================================ */
function applyFilters() {
  activeFilters.location = document.getElementById('filterLocation').value;
  activeFilters.status = document.getElementById('filterStatus').value;
  activeFilters.search = document.getElementById('filterSearch').value.toLowerCase().trim();

  // Check for pre-filter from URL params (workstation alert linkage)
  var params = new URLSearchParams(window.location.search);
  var preStatus = params.get('status');
  if (preStatus && !activeFilters.status) {
    activeFilters.status = preStatus;
    document.getElementById('filterStatus').value = preStatus;
  }

  filteredCabinets = cabinets.filter(function(c) {
    if (activeFilters.location && c.location !== activeFilters.location) return false;
    if (activeFilters.status && c.status !== activeFilters.status) return false;
    if (activeFilters.search) {
      var q = activeFilters.search;
      if (c.code.toLowerCase().indexOf(q)===-1 && c.name.toLowerCase().indexOf(q)===-1) return false;
    }
    return true;
  });

  currentPage = 1;
  updateKPIs(filteredCabinets);
  renderTable();
  renderPagination();
}

function resetFilters() {
  document.getElementById('filterLocation').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterSearch').value = '';
  applyFilters();
}

/* Populate location filter */
function initFilters() {
  var sel = document.getElementById('filterLocation');
  var seen = {};
  for (var i = 0; i < cabinets.length; i++) {
    if (!seen[cabinets[i].location]) {
      seen[cabinets[i].location] = true;
      sel.innerHTML += '<option value="'+cabinets[i].location+'">'+cabinets[i].location+'</option>';
    }
  }
  // Apply pre-filter from URL (workstation alert → pre-filter offline)
  var params = new URLSearchParams(window.location.search);
  var preStatus = params.get('status');
  if (preStatus) {
    document.getElementById('filterStatus').value = preStatus;
  }
}

  currentView = view;
  document.getElementById('listView').classList.toggle('hidden', view !== 'list');

  document.getElementById('tabList').classList.toggle('active', view === 'list');

}

var statusLabels = { free:'空闲', occupied:'占用', maintenance:'维护中', 'disabled-cell':'停用' };

function showLockerTooltip(e, id, type, status, orderNo) {
  var tip = document.getElementById('lockerTooltip');
  var label = statusLabels[status] || status;
  var typeLabel = type==='S'?'小型':(type==='M'?'中型':'大型');
  var html = '<div><b>'+id+'</b> · '+typeLabel+' · '+label+'</div>';
  if (orderNo) html += '<div style="margin-top:2px;opacity:.7;">关联订单：'+orderNo+'</div>';
  tip.innerHTML = html;
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top = (e.clientY - 40) + 'px';
  tip.classList.add('show');
}

function hideLockerTooltip() {
  document.getElementById('lockerTooltip').classList.remove('show');
}

function onLockerClick(e, id, type, status, orderNo) {
  var label = statusLabels[status] || status;
  var typeLabel = type==='S'?'小型':(type==='M'?'中型':'大型');

  if (orderNo) msg += '\n关联订单：' + orderNo;
  msg += '\n\n一期只读，不可进行控制操作。';

}

/* ================================================================
   MENU SELECT — unified sidebar menu interaction handler
   ================================================================ */
function menuSelect(el) {
  if (el.classList.contains('l1')) { handleL1(el); }
  else if (el.classList.contains('l2')) { handleL2(el); }
}
function handleL1(el) {
  var subId = el.getAttribute('data-sub');
  if (subId) { handleL1Toggle(el, subId); }
  else { selectL1NoChildren(el); }
}
function handleL1Toggle(el, subId) {
  var sub = document.getElementById(subId);
  if (!sub) return;
  var arrow = el.querySelector('.menu-arrow');
  var isExpanded = !sub.classList.contains('collapsed');
  if (isExpanded) {
    sub.classList.add('collapsed');
    if (arrow) arrow.classList.remove('open');
    if (!sub.querySelector('.menu-item.active-l2')) { el.classList.remove('active-l1'); }
  } else {
    collapseAllExcept(subId);
    sub.classList.remove('collapsed');
    if (arrow) arrow.classList.add('open');
    if (sub.querySelector('.menu-item.active-l2')) { el.classList.add('active-l1'); }
  }
}
function selectL1NoChildren(el) {
  collapseAllExcept(null);
  clearAllActive();
  // Don't re-select if already active (prevents duplicate navigation)
  if (!el.classList.contains('active-l1')) {
    el.classList.add('active-l1');
    var page = el.getAttribute('data-page');
    navigateToPage(page);
  }
}
function handleL2(el) {
  var parentSub = el.closest('.submenu');
  var parentSubId = parentSub ? parentSub.id : null;
  collapseAllExcept(parentSubId);
  if (parentSub && parentSub.classList.contains('collapsed')) { parentSub.classList.remove('collapsed'); }
  clearAllActive();
  el.classList.add('active-l2');
  var parentL1 = findParentL1BySubId(parentSubId);
  if (parentL1) { parentL1.classList.add('active-l1'); var arrow = parentL1.querySelector('.menu-arrow'); if (arrow) arrow.classList.add('open'); }
  var page = el.getAttribute('data-page');
  navigateToPage(page);
}
function collapseAllExcept(keepSubId) {
  document.querySelectorAll('.submenu').forEach(function(sub) {
    if (sub.id === keepSubId) return;
    if (sub.classList.contains('collapsed')) return;
    sub.classList.add('collapsed');
    var l1 = findParentL1BySubId(sub.id);
    if (l1) { var arrow = l1.querySelector('.menu-arrow'); if (arrow) arrow.classList.remove('open'); if (!sub.querySelector('.menu-item.active-l2')) { l1.classList.remove('active-l1'); } }
  });
}
function clearAllActive() {
  document.querySelectorAll('.menu-item').forEach(function(item) { item.classList.remove('active-l1', 'active-l2'); });
}
function findParentL1BySubId(subId) {
  if (!subId) return null;
  return document.querySelector('.menu-item.l1[data-sub="'+subId+'"]');
}
function navigateToPage(page) {
  if (!page) return;
  var fname = page.split("/").pop();
  var cur = window.location.pathname.split("/").pop();
  if (fname === cur) return;
  if (page.endsWith('.html')) { window.location.href = page; }
  else {
    document.getElementById('mainContent').innerHTML =
      '<div class="p-4"><div class="bg-white rounded-lg border border-line p-5 md:p-6">'+
      '<h2 class="text-[16px] font-semibold text-ink-title mb-2">'+page+'</h2>'+
      '<p class="text-[14px] text-ink-muted">该页面开发中，敬请期待。</p></div></div>';
  }
}

  var cur = window.location.pathname.split("/").pop();
  if (fname === cur) return;
  window.location.href = url;
}

var annoVisible = true;

function renderAnnoBadges() {
  var layer = document.getElementById('annoLayer');
  layer.innerHTML = '';
  if (!annoVisible) return;
  var vw = window.innerWidth;
  document.querySelectorAll('[data-anno]').forEach(function(el) {
    var id = el.getAttribute('data-anno');
    if (el.offsetParent === null && el.tagName !== 'BODY') return;
    var target = resolveAnnoTarget(el, vw);
    var rect = target.getBoundingClientRect();
    if (rect.width === 0 && rect.height === 0) return;
    var badge = document.createElement('div');
    badge.className = 'anno-portal-badge';
    badge.textContent = id;
    badge.style.top  = (rect.top  - 10) + 'px';
    badge.style.left = (rect.right - 10) + 'px';
    badge.addEventListener('click', function(e) { e.stopPropagation(); showAnnoPopup(id); });
    layer.appendChild(badge);
  });
}

function resolveAnnoTarget(el, vw) {
  var rect = el.getBoundingClientRect();
  if (rect.width < 800 || rect.width < vw * 0.7) return el;
  var inner = el.querySelector('h1, h2, h3, h4, h5, h6, button, .btn, input, select, .card-title, [class*="title"]');
  if (inner) { var ir = inner.getBoundingClientRect(); if (ir.width < rect.width * 0.8) return inner; }
  var first = el.firstElementChild;
  if (first) { var fr = first.getBoundingClientRect(); if (fr.width < rect.width * 0.9) return first; }
  return el;
}

function showAnnoPopup(id) {
  var a = annotations[id];
  if (!a) return;
  document.getElementById('annoPopupTitle').textContent = '#' + id + ' ' + a.title;
  document.getElementById('annoPopupBody').innerHTML = a.desc.map(function(d) {
    return '<li class="flex items-start gap-2"><span class="text-primary font-bold flex-shrink-0">•</span><span>'+d+'</span></li>';
  }).join('');
  var box = document.getElementById('annoPopupBox');
  box.style.top = '50%'; box.style.left = '50%'; box.style.transform = 'translate(-50%,-50%)';
  document.getElementById('annoPopup').classList.remove('hidden');
}

function closeAnnoPopup() {
  document.getElementById('annoPopup').classList.add('hidden');
}

/* Drag popup */
var popupDrag = { offX:0, offY:0, moved:false };
function startDragPopup(e) {
  if (e.target.closest('button')) return;
  popupDrag.moved = false;
  var box = document.getElementById('annoPopupBox');
  var rect = box.getBoundingClientRect();
  popupDrag.offX = e.clientX - rect.left;
  popupDrag.offY = e.clientY - rect.top;
  document.addEventListener('mousemove', onDragPopup);
  document.addEventListener('mouseup', stopDragPopup);
}
function onDragPopup(e) {
  var dx = Math.abs(e.clientX - popupDrag.offX - document.getElementById('annoPopupBox').getBoundingClientRect().left);
  if (dx < 3 && !popupDrag.moved) return;
  popupDrag.moved = true;
  var box = document.getElementById('annoPopupBox');
  box.style.transform = 'none';
  box.style.top  = Math.max(0, Math.min(window.innerHeight - 100, e.clientY - popupDrag.offY)) + 'px';
  box.style.left = Math.max(0, Math.min(window.innerWidth  - 100, e.clientX - popupDrag.offX)) + 'px';
  document.getElementById('annoPopupDrag').style.cursor = 'grabbing';
}
function stopDragPopup() {
  document.removeEventListener('mousemove', onDragPopup);
  document.removeEventListener('mouseup', stopDragPopup);
  var h = document.getElementById('annoPopupDrag');
  if (h) h.style.cursor = 'grab';
}

/* Toggle annotations */
document.getElementById('annoToggle').addEventListener('click', function(e) {
  if (this.dataset.dragging === '1') return;
  annoVisible = !annoVisible;
  if (annoVisible) {
    document.body.classList.remove('anno-hidden');
    document.getElementById('annoToggleIcon').setAttribute('data-lucide', 'eye');
  } else {
    document.body.classList.add('anno-hidden');
    document.getElementById('annoToggleIcon').setAttribute('data-lucide', 'eye-off');
  }
  lucide.createIcons({ attrs: { class: 'w-[13px] h-[13px]' } });
  renderAnnoBadges();
});

/* Drag toggle */
var dragToggleY = 0, dragToggleMoved = false;
function startDragToggle(e) {
  dragToggleY = e.clientY; dragToggleMoved = false;
  document.addEventListener('mousemove', onDragToggle);
  document.addEventListener('mouseup', stopDragToggle); e.preventDefault();
}
function onDragToggle(e) {
  if (Math.abs(e.clientY - dragToggleY) < 5) return;
  dragToggleMoved = true;
  var w = document.getElementById('annoToggle');
  w.style.top = Math.max(60, Math.min(window.innerHeight - 60, e.clientY - 20)) + 'px';
  w.style.right = '8px'; w.style.cursor = 'grabbing';
}
function stopDragToggle() {
  document.removeEventListener('mousemove', onDragToggle);
  document.removeEventListener('mouseup', stopDragToggle);
  var w = document.getElementById('annoToggle');
  if (w) { w.style.cursor = 'grab'; w.dataset.dragging = dragToggleMoved ? '1' : ''; }
}

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded', function() {
  lastSyncTime = new Date();
  updateSyncTime();
  initFilters();
  filteredCabinets = cabinets.slice();
  updateKPIs(filteredCabinets);
  renderTable();
  renderPagination();
  lucide.createIcons();
  renderAnnoBadges();
  document.getElementById('mainContent').addEventListener('scroll', renderAnnoBadges);
  window.addEventListener('resize', renderAnnoBadges);

  // Check for pre-filter from URL (workstation alert linkage)
  var params = new URLSearchParams(window.location.search);
  if (params.get('status')) {
    applyFilters();
  }
});
</script>
