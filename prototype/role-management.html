/* ===== HELPERS ===== */
function selRole(){ return roleList.find(r=>r.id===selectedRoleId); }
function roleMembers(){ return memberList.filter(m=>m.roleId===selectedRoleId); }
function formatPhone(p){ return p?p.replace(/(\d{3})\d{4}(\d{4})/,'$1****$2'):'-'; }

/* ===== RENDER ROLE LIST ===== */
function renderRoleList(){
  const kw = roleSearch.toLowerCase();
  const filtered = roleList.filter(r => !kw || r.name.toLowerCase().includes(kw));
  const container = document.getElementById('roleList');
  let html = '';
  filtered.forEach(r => {
    const icon = r.isSystem ? 'lock' : 'user';
    const activeCls = r.id === selectedRoleId ? ' active' : '';
    html += '<div class="role-item'+activeCls+'" data-role-id="'+r.id+'">';
    html += '<div class="w-8 h-8 rounded-md flex items-center justify-center mr-2.5 flex-shrink-0" style="background:#E6F0FF;color:#0066FF;"><i data-lucide="'+icon+'" class="w-[15px] h-[15px]"></i></div>';
    html += '<div class="flex-1 min-w-0"><div class="text-[14px] text-ink-body truncate">'+r.name+'</div><div class="text-[12px] text-ink-muted font-mono">('+r.memberCount+'人)</div></div>';
    html += '<span class="role-more flex-shrink-0 w-6 h-6 flex items-center justify-center rounded hover:bg-line-lighter text-ink-sub cursor-pointer" data-role-id="'+r.id+'"><i data-lucide="more-horizontal" class="w-[14px] h-[14px]"></i></span>';
    html += '</div>';
  });
  if (filtered.length === 0) html = '<div class="flex items-center justify-center py-10 text-[13px] text-ink-muted">暂无搜索结果</div>';
  container.innerHTML = html;
  lucide.createIcons({attrs:{class:'w-[14px] h-[14px]'}});
  // Bind clicks
  container.querySelectorAll('.role-item').forEach(item => {
    item.addEventListener('click', function(e){
      if(e.target.closest('.role-more')) return;
      selectedRoleId = this.getAttribute('data-role-id');
      renderRoleList(); renderDetail();
    });
  });
  container.querySelectorAll('.role-more').forEach(btn => {
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      const rid = this.getAttribute('data-role-id');
      const r = roleList.find(x=>x.id===rid);
      openRoleMenu(e, r);
    });
  });
}

function openRoleMenu(e, role){
  document.querySelectorAll('.context-menu').forEach(m=>m.remove());
  const menu = document.createElement('div'); menu.className = 'context-menu';
  menu.style.left = e.clientX+'px'; menu.style.top = e.clientY+'px';
  const items = [
    { label:'编辑', action(){ openRoleDialog('edit',role.id); close(); } },
  ];
  if (!role.isSystem) items.push({ label:'删除', cls:'danger', action(){ if(role.isSystem){showToast('系统角色不可删除','warning');close();return;} currentDeleteRoleId = role.id; document.getElementById('deleteModalOverlay').classList.remove('hidden'); close(); } });
  items.forEach(item => {
    const d = document.createElement('div'); d.className = 'context-menu-item'+(item.cls?' '+item.cls:''); d.textContent = item.label; d.onclick = item.action; menu.appendChild(d);
  });
  document.body.appendChild(menu);
  function close(){ menu.remove(); document.removeEventListener('click',close); }
  setTimeout(()=>document.addEventListener('click',close),0);
}

/* ===== RENDER DETAIL ===== */
function renderDetail(){
  const role = selRole();
  const empty = document.getElementById('detailEmpty');
  const content = document.getElementById('detailContent');
  if (!role) { empty.classList.remove('hidden'); content.classList.add('hidden'); return; }
  empty.classList.add('hidden'); content.classList.remove('hidden');
  const statusDot = role.status===1?'#0FC060':'#9DA2AC';
  const statusText = role.status===1?'已启用':'已停用';
  let html = '';
  // Header
  html += '<div class="flex items-center justify-between mb-4"><div class="flex items-center gap-3"><span class="text-[18px] font-semibold text-ink-title">'+role.name+'</span><span class="flex items-center gap-1.5 text-[13px] text-ink-sub"><span class="w-2 h-2 rounded-full inline-block" style="background:'+statusDot+'"></span>'+statusText+'</span></div><div class="flex gap-4"><span class="btn-text cursor-pointer relative" onclick="openRoleDialog(\'edit\',\''+role.id+'\')">编辑</span>'+(!role.isSystem?'<span class="btn-text danger cursor-pointer" onclick="deleteRole()">删除</span>':'')+'</div></div>';
  // Base info
  html += '<div class="flex gap-6 py-4 border-b border-line-light mb-5 text-[13px]"><span class="text-ink-muted">创建人 <span class="text-ink-body ml-2">'+role.creator+'</span></span><span class="text-ink-muted">创建时间 <span class="text-ink-body ml-2 font-mono text-[12px]">'+role.createTime+'</span></span><span class="text-ink-muted">备注 <span class="text-ink-body ml-2">'+role.remark+'</span></span></div>';
  // Tabs
  html += '<div class="flex border-b border-line mb-5 relative">';
  html += '<span class="anno-badge" data-anno="4">4</span>';
  ['member','permission','data'].forEach(t => {
    const labels = {member:'角色成员',permission:'功能权限',data:'数据权限'};
    html += '<div class="tab-item'+(t===activeTab?' active':'')+'" data-tab="'+t+'">'+labels[t]+'</div>';
  });
  html += '</div>';
  // Tab content
  if (activeTab === 'member') {
    html += renderMemberTab();
  } else if (activeTab === 'permission') {
    html += '<div class="relative"><span class="anno-badge" data-anno="5">5</span><div class="tip-box ml-7"><i data-lucide="info" class="w-[15px] h-[15px] flex-shrink-0 mt-0.5" style="color:#0066FF"></i><span>功能权限说明：若拥有该菜单模块下所有功能权限则显示"所有权限"，若没有全部拥有则将有的功能权限以"、"隔开显示</span></div></div>';
    html += '<table class="data-table"><thead><tr><th>菜单功能</th><th>权限</th></tr></thead><tbody>';
    permissionList.forEach(p => {
      html += '<tr><td>'+p.menuName+'</td><td><span class="'+(p.isAllPermission?'text-success font-medium':'text-ink-body')+'">'+p.permissionText+'</span></td></tr>';
    });
    html += '</tbody></table>';
  } else if (activeTab === 'data') {
    html += '<div class="relative"><span class="anno-badge" data-anno="6">6</span><div class="tip-box ml-7"><i data-lucide="info" class="w-[15px] h-[15px] flex-shrink-0 mt-0.5" style="color:#0066FF"></i><span>数据权限说明：数据权限用于控制角色可见的数据范围</span></div></div>';
    html += '<table class="data-table"><thead><tr><th>权限</th></tr></thead><tbody>';
    dataPerms.forEach(dp => { html += '<tr><td>'+dp.permissionName+'</td></tr>'; });
    html += '</tbody></table>';
  }
  content.innerHTML = html;
  lucide.createIcons({attrs:{class:'w-[14px] h-[14px]'}});
  // Bind tabs
  content.querySelectorAll('.tab-item').forEach(tab => {
    tab.addEventListener('click', function(){ activeTab = this.getAttribute('data-tab'); renderDetail(); });
  });
}

function renderMemberTab(){
  const members = roleMembers();
  const kw = memberSearch.toLowerCase();
  const filtered = kw ? members.filter(m => m.name.toLowerCase().includes(kw)||(m.nickname||'').toLowerCase().includes(kw)||m.phone.includes(kw)) : members;
  let html = '';
  // Actions
  html += '<div class="flex items-center justify-between mb-4"><div class="relative w-[280px]"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-[15px] h-[15px] text-ink-muted"></i><input type="text" id="memberSearchInput" placeholder="请输入成员名称/昵称/手机号搜索" class="form-input pl-9 h-[32px]" value="'+memberSearch+'"></div><div class="flex gap-2"><button class="btn btn-primary btn-sm" onclick="openAddMember()">添加成员</button><button class="btn btn-default btn-sm" onclick="batchRemove()">移除成员</button></div></div>';
  // Table
  html += '<table class="data-table"><thead><tr><th style="width:40px"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th><th>成员名称</th><th>昵称</th><th>手机号</th><th>所在部门</th><th style="width:80px">操作</th></tr></thead><tbody>';
  if (filtered.length === 0) {
    html += '<tr><td colspan="6" class="text-center text-ink-muted py-10">'+(kw?'暂无搜索结果':'该角色暂无成员')+'</td></tr>';
  } else {
    filtered.forEach(m => {
      const checked = selectedMemberIds.includes(m.id);
      html += '<tr><td><input type="checkbox" '+(checked?'checked':'')+' value="'+m.id+'" onchange="toggleMemberSelect(this)" class="w-[15px] h-[15px]"></td><td>'+m.name+'</td><td>'+(m.nickname||'-')+'</td><td class="font-mono text-[12px]">'+formatPhone(m.phone)+'</td><td>'+m.deptName+'</td><td><span class="action-link" onclick="removeMember(\''+m.id+'\')">移除</span></td></tr>';
    });
  }
  html += '</tbody></table>';
  // Pagination info
  html += '<div class="flex justify-end mt-4 text-[12px] text-ink-muted">共 '+members.length+' 人，当前显示 '+filtered.length+' 人</div>';
  return html;
}

/* ===== ROLE MODAL ===== */
function openRoleDialog(type, roleId){
  currentRoleAction = {type, roleId};
  document.getElementById('roleModalTitle').textContent = type==='edit'?'编辑角色':'新增角色';
  document.getElementById('roleNameError').classList.add('hidden');
  if (type === 'edit') {
    const r = roleList.find(x=>x.id===roleId);
    if (r) { document.getElementById('roleName').value = r.name; document.getElementById('roleDesc').value = r.description||''; }
  } else { document.getElementById('roleName').value = ''; document.getElementById('roleDesc').value = ''; }
  document.getElementById('roleModalOverlay').classList.remove('hidden');
}
function closeRoleModal(){ document.getElementById('roleModalOverlay').classList.add('hidden'); }
function confirmRole(){
  const name = document.getElementById('roleName').value.trim();
  const desc = document.getElementById('roleDesc').value.trim();
  const errEl = document.getElementById('roleNameError');
  if(!name){ errEl.textContent='请输入角色名称'; errEl.classList.remove('hidden'); return; }
  if(name.length>20){ errEl.textContent='角色名称不能超过20字'; errEl.classList.remove('hidden'); return; }
  const excludeId = currentRoleAction.type==='edit'?currentRoleAction.roleId:null;
  if(roleList.some(r=>r.id!==excludeId&&r.name===name)){ errEl.textContent='角色名称已存在'; errEl.classList.remove('hidden'); return; }
  errEl.classList.add('hidden');
  if(currentRoleAction.type==='edit'){
    const r = roleList.find(x=>x.id===currentRoleAction.roleId);
    if(r){ r.name=name; r.description=desc; }
    showToast('编辑成功','success');
  }else{
    roleList.push({id:'r'+Date.now(),name,description:desc,status:1,creator:'当前用户',createTime:new Date().toLocaleString('zh-CN'),remark:'- -',memberCount:0,isSystem:false});
    showToast('添加成功','success');
  }
  closeRoleModal(); renderRoleList(); renderDetail();
}
function deleteRole(){ currentDeleteRoleId = selectedRoleId; document.getElementById('deleteModalOverlay').classList.remove('hidden'); }
function closeDeleteModal(){ document.getElementById('deleteModalOverlay').classList.add('hidden'); }
function confirmDelete(){
  const idx = roleList.findIndex(r=>r.id===currentDeleteRoleId);
  if(idx!==-1){ roleList.splice(idx,1); for(let i=memberList.length-1;i>=0;i--){if(memberList[i].roleId===currentDeleteRoleId)memberList.splice(i,1);} }
  if(selectedRoleId===currentDeleteRoleId) selectedRoleId = null;
  showToast('删除成功','success');
  closeDeleteModal(); renderRoleList(); renderDetail();
}

/* ===== ADD MEMBER ===== */
function openAddMember(){
  addMemberSearchKw = ''; document.getElementById('addMemberSearch').value = '';
  availableList = availableMembers.map(m=>({...m,added:false}));
  pendingAddIds = [];
  updateAddMemberTable();
  document.getElementById('addMemberModalOverlay').classList.remove('hidden');
}
function closeAddMemberModal(){ document.getElementById('addMemberModalOverlay').classList.add('hidden'); }
function searchAvailableMembers(){
  addMemberSearchKw = document.getElementById('addMemberSearch').value.trim();
  const kw = addMemberSearchKw.toLowerCase();
  availableList = (kw ? availableMembers.filter(m=>m.name.toLowerCase().includes(kw)) : [...availableMembers]).map(m=>({...m,added:pendingAddIds.includes(m.id)}));
  updateAddMemberTable();
}
function updateAddMemberTable(){
  let html = '<thead><tr><th>成员名称</th><th>所属部门</th><th style="width:80px">操作</th></tr></thead><tbody>';
  availableList.forEach(m => {
    html += '<tr><td>'+m.name+'</td><td>'+m.deptName+'</td><td>';
    if(m.added) html += '<span class="text-success text-[12px] font-medium">已添加</span>';
    else html += '<span class="action-link" onclick="addSingleMember(\''+m.id+'\')">添加</span>';
    html += '</td></tr>';
  });
  html += '</tbody>';
  document.getElementById('availableMemberTable').innerHTML = html;
  document.getElementById('addCount').textContent = pendingAddIds.length;
}
function addSingleMember(id){
  pendingAddIds.push(id);
  const m = availableList.find(x=>x.id===id);
  if(m) m.added = true;
  updateAddMemberTable();
}
function confirmAddMembers(){
  if(pendingAddIds.length===0){ showToast('请先添加成员','warning'); return; }
  const newMembers = availableMembers.filter(m=>pendingAddIds.includes(m.id)).map(m=>({id:'m'+Date.now()+Math.random(),name:m.name,nickname:'',phone:'',deptName:m.deptName,roleId:selectedRoleId}));
  memberList.push(...newMembers);
  const r = selRole(); if(r) r.memberCount = roleMembers().length;
  showToast('添加成功','success');
  closeAddMemberModal(); renderRoleList(); renderDetail();
}

/* ===== REMOVE MEMBER ===== */
function removeMember(memberId){
  if(roleMembers().length===1){ showToast('该角色至少保留一个成员','warning'); return; }
  currentRemoveMember = memberId;
  document.getElementById('removeModalOverlay').classList.remove('hidden');
}
function closeRemoveModal(){ document.getElementById('removeModalOverlay').classList.add('hidden'); }
function confirmRemove(){
  const idx = memberList.findIndex(m=>m.id===currentRemoveMember);
  if(idx!==-1) memberList.splice(idx,1);
  const r = selRole(); if(r) r.memberCount = roleMembers().length;
  selectedMemberIds = selectedMemberIds.filter(id=>id!==currentRemoveMember);
  showToast('移除成功','success');
  closeRemoveModal(); renderDetail(); renderRoleList();
}

/* ===== BATCH REMOVE ===== */
function toggleSelectAll(cb){
  const members = roleMembers();
  if(cb.checked){ members.forEach(m=>{ if(!selectedMemberIds.includes(m.id)) selectedMemberIds.push(m.id); }); }
  else { selectedMemberIds = []; }
  renderDetail();
}
function toggleMemberSelect(cb){
  if(cb.checked) selectedMemberIds.push(cb.value);
  else selectedMemberIds = selectedMemberIds.filter(id=>id!==cb.value);
}
function batchRemove(){
  if(selectedMemberIds.length===0){ showToast('请先选择要移除的成员','warning'); return; }
  if(roleMembers().length - selectedMemberIds.length === 0){ showToast('该角色至少保留一个成员','warning'); return; }
  document.getElementById('batchRemoveMsg').innerHTML = '已选择 '+selectedMemberIds.length+' 个成员，移除后这些成员将失去该角色的权限，<br>请谨慎操作。';
  document.getElementById('batchRemoveModalOverlay').classList.remove('hidden');
}
function closeBatchRemoveModal(){ document.getElementById('batchRemoveModalOverlay').classList.add('hidden'); }
function confirmBatchRemove(){
  for(let i=memberList.length-1;i>=0;i--){ if(selectedMemberIds.includes(memberList[i].id)) memberList.splice(i,1); }
  const r = selRole(); if(r) r.memberCount = roleMembers().length;
  selectedMemberIds = [];
  showToast('移除成功','success');
  closeBatchRemoveModal(); renderDetail(); renderRoleList();
}

/* ===== TOAST ===== */
let toastTimer=null;
function showToast(msg,type='info'){
  if(toastTimer)clearTimeout(toastTimer);
  const el=document.getElementById('toast');
  const c={info:{bg:'#1A1D24',c:'#fff'},success:{bg:'#0FC060',c:'#fff'},error:{bg:'#D9001B',c:'#fff'},warning:{bg:'#E7772D',c:'#fff'}};
  const t=c[type]||c.info; el.textContent=msg; el.style.background=t.bg; el.style.color=t.c; el.style.opacity='1';
  toastTimer=setTimeout(()=>{el.style.opacity='0';},2500);
}

/* ===== DRAG: Annotation Modal ===== */
let dragModal = null, dragOffX = 0, dragOffY = 0, dragStartTime = 0, dragActive = false;
function startDragModal(e){
  if(e.target.closest('button')) return;
  dragStartTime = Date.now();
  dragActive = false;
  const modal = document.getElementById('annoModal');
  if(!modal) return;
  document.addEventListener('mousemove', onDragModal);
  document.addEventListener('mouseup', stopDragModal);
  dragOffX = e.clientX - modal.offsetLeft;
  dragOffY = e.clientY - modal.offsetTop;
}
function onDragModal(e){
  if(Date.now() - dragStartTime < 200) return;
  dragActive = true;
  const modal = document.getElementById('annoModal');
  if(!modal) return;
  modal.style.left = (e.clientX - dragOffX) + 'px';
  modal.style.top = (e.clientY - dragOffY) + 'px';
  modal.style.transform = 'none';
  document.getElementById('annoDragHandle').style.cursor = 'grabbing';
}
function stopDragModal(){
  document.removeEventListener('mousemove', onDragModal);
  document.removeEventListener('mouseup', stopDragModal);
  if(document.getElementById('annoDragHandle'))
    document.getElementById('annoDragHandle').style.cursor = 'grab';
}

/* ===== DRAG: Toggle Button ===== */
let dragToggle = null, dragToggleY = 0, dragToggleActive = false, dragToggleMoved = false;
function startDragToggle(e){
  if(e.target.closest('button') && e.target.closest('#annoToggleWrap')) return;
  dragToggleActive = true; dragToggleMoved = false;
  dragToggleY = e.clientY;
  document.addEventListener('mousemove', onDragToggle);
  document.addEventListener('mouseup', stopDragToggle);
  e.preventDefault();
}
function onDragToggle(e){
  if(Math.abs(e.clientY - dragToggleY) < 5) return;
  dragToggleMoved = true;
  const wrap = document.getElementById('annoToggleWrap');
  if(!wrap) return;
  let newTop = e.clientY - 20;
  newTop = Math.max(60, Math.min(window.innerHeight - 60, newTop));
  wrap.style.top = newTop + 'px';
  wrap.style.right = '8px';
  wrap.style.cursor = 'grabbing';
}
function stopDragToggle(e){
  document.removeEventListener('mousemove', onDragToggle);
  document.removeEventListener('mouseup', stopDragToggle);
  if(document.getElementById('annoToggleWrap')){
    document.getElementById('annoToggleWrap').style.cursor = 'grab';
    document.getElementById('annoToggleWrap').dataset.dragging = dragToggleMoved ? '1' : '';
    if(dragToggleMoved) setTimeout(function(){ document.getElementById('annoToggleWrap').dataset.dragging = ''; }, 100);
  }
}
function closeAnnoModal(){document.getElementById('annoModal').classList.add('hidden');}
document.addEventListener('click',function(e){
  var m=document.getElementById('annoModal');
  if(!m||m.classList.contains('hidden'))return;
  if(!m.contains(e.target))closeAnnoModal();
});

  var modal = document.getElementById('annoModal');
  if(!modal || modal.classList.contains('hidden')) return;
  if(!modal.contains(e.target)) closeAnnoModal();
});

/* ===== SIDEBAR MENU ===== */
(function(){
  var sb = document.getElementById('sidebar');
  if(!sb) return;
  sb.addEventListener('click', function(e){
    var el = e.target.closest('.js-toggle-sub');
    if(!el) return;
    var targetId = el.getAttribute('data-target');
    var sub = document.getElementById(targetId);
    if(!sub) return;
    var arrow = el.querySelector('.menu-arrow');
    if(sub.classList.contains('collapsed')){
      sub.classList.remove('collapsed');
      if(arrow) arrow.classList.add('open');
    } else {
      sub.classList.add('collapsed');
      if(arrow) arrow.classList.remove('open');
    }
  });
})();

</script>
