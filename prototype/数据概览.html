<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数据概览 - 游寄后台管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{primary:{DEFAULT:'#0066FF',hover:'#0052CC',active:'#0047B3',bg:'#E6F0FF'},ink:{title:'#1A1D24',body:'#3A3F4A',sub:'#6E7685',muted:'#9DA2AC'},line:{DEFAULT:'#DFE1E5',light:'#E8EAED',lighter:'#F0F1F3'},bg:{page:'#F7F8FA',card:'#FFFFFF',hover:'#F3F4F6'},success:{DEFAULT:'#0FC060',bg:'#E7F9F0'},warning:{DEFAULT:'#E7772D',bg:'#FDF2E9'},danger:{DEFAULT:'#D9001B',bg:'#FFE8EB'},info:{DEFAULT:'#0091D5',bg:'#E4F4FB'}},borderRadius:{DEFAULT:'4px',md:'6px',lg:'8px'},fontFamily:{sans:['-apple-system','BlinkMacSystemFont','PingFang SC','Microsoft YaHei','Hiragino Sans GB','Segoe UI','system-ui','sans-serif'],mono:['JetBrains Mono','monospace']}}}}</script>
  <style>
    body{overflow:hidden;}
    /* Sidebar */
    .menu-item{cursor:pointer;transition:background .12s,color .12s;user-select:none;display:flex;align-items:center;gap:10px;padding:10px 16px;color:#1A1D24;font-size:13px;position:relative;text-decoration:none;}
    .menu-item:hover{background:#F3F4F6;}
    .menu-item.l1{padding-left:20px;font-weight:500;}
    .menu-item.l2{padding-left:64px;font-size:13px;}
    .menu-item.active-l1{color:#0066FF;}
    .menu-item.active-l2{background:#E6F0FF;color:#0066FF;font-weight:500;}
    .menu-ico{width:28px;height:28px;border-radius:7px;border:1.5px solid #D0D3D9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#6E7685;flex-shrink:0;transition:all .15s;}
    .active-l1 .menu-ico{background:#0066FF;border-color:#0066FF;color:#fff;}
    .menu-arrow{font-size:10px;color:#9DA2AC;margin-left:auto;transition:transform .2s;flex-shrink:0;}
    .menu-arrow.open{transform:rotate(180deg);}
    .submenu{overflow:hidden;transition:max-height .25s ease,opacity .2s;}
    .submenu.collapsed{max-height:0!important;opacity:0;}
    .new-tag{display:inline-block;padding:1px 7px;border-radius:8px;background:#0066FF;color:#fff;font-size:10px;font-weight:600;line-height:16px;margin-left:4px;}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:32px;padding:0 14px;font-size:13px;font-weight:500;border-radius:4px;border:1px solid transparent;cursor:pointer;transition:all .15s;outline:none;}
    .btn-primary{background:#0066FF;color:#fff;border-color:#0066FF;}
    .btn-primary:hover{background:#0052CC;}
    .btn-default{background:#fff;color:#3A3F4A;border-color:#DFE1E5;}
    .btn-default:hover{border-color:#0066FF;color:#0066FF;}
    .btn-sm{height:28px;padding:0 10px;font-size:12px;}
    /* Filter pill */
    .filter-pill{display:inline-flex;align-items:center;height:28px;padding:0 12px;font-size:12px;border-radius:4px;border:1px solid #DFE1E5;background:#fff;color:#3A3F4A;cursor:pointer;transition:all .15s;white-space:nowrap;}
    .filter-pill:hover{border-color:#0066FF;color:#0066FF;}
    .filter-pill.active{background:#0066FF;border-color:#0066FF;color:#fff;}
    /* KPI card */
    .kpi-card{border-radius:6px;border:1px solid #E8EAED;background:#fff;padding:16px 20px;transition:box-shadow .15s,transform .15s;cursor:pointer;}
    .kpi-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06);transform:translateY(-1px);}
    .kpi-card.danger-highlight{border-color:#D9001B;background:#FFFAFA;}
    /* Chart container */
    .chart-wrap{position:relative;width:100%;}
    .chart-wrap canvas{width:100%!important;}
    /* Toast */
    #toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);z-index:10000;background:#1A1D24;color:#fff;padding:10px 24px;border-radius:6px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;}
    #toast.show{opacity:1;}
    /* Portal annotation layer */
    .anno-portal-badge{position:absolute;width:20px;height:20px;border-radius:50%;background:#0066FF;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15);transition:transform .15s;line-height:1;pointer-events:auto;}
    .anno-portal-badge:hover{transform:scale(1.2);}
    .anno-hidden .anno-portal-badge{display:none;}
    /* Topbar icons */
    .topbar-btn{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:#F3F4F6;cursor:pointer;transition:background .15s;position:relative;border:none;outline:none;}
    .topbar-btn:hover{background:#E6F0FF;}
    .topbar-btn:hover svg{stroke:#0066FF;}
    .badge-dot{position:absolute;top:-2px;right:-2px;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#FF3B30;color:#fff;font-size:10px;font-weight:600;line-height:18px;text-align:center;}
    /* Date input styling */
    input[type="date"]{font-family:inherit;font-size:12px;height:28px;padding:0 8px;border-radius:4px;border:1px solid #DFE1E5;color:#3A3F4A;background:#fff;outline:none;}
    input[type="date"]:focus{border-color:#0066FF;box-shadow:0 0 0 2px rgba(0,102,255,.12);}
    /* Select styling */
    .filter-select{font-family:inherit;font-size:12px;height:28px;padding:0 24px 0 8px;border-radius:4px;border:1px solid #DFE1E5;color:#3A3F4A;background:#fff;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;}
    .filter-select:focus{border-color:#0066FF;box-shadow:0 0 0 2px rgba(0,102,255,.12);}
    .select-wrap{position:relative;display:inline-flex;align-items:center;}
    .select-wrap::after{content:'▼';position:absolute;right:8px;font-size:7px;color:#9DA2AC;pointer-events:none;}
    /* Responsive sidebar */
    @media(max-width:768px){
      .sidebar{display:none;}
      .sidebar.open{display:flex;position:fixed;top:56px;left:0;bottom:0;z-index:50;}
      .sidebar-overlay{display:none;}
      .sidebar-overlay.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:49;}
    }
    /* Emphasis section */
    .emphasis-ring{width:140px;height:140px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;}
    /* Skeleton */
    @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
    .skeleton{background:linear-gradient(90deg,#F0F1F3 25%,#E8EAED 50%,#F0F1F3 75%);background-size:800px 100%;animation:shimmer 1.5s infinite;}
  </style>
</head>
<body class="font-sans flex flex-col h-screen">

<!-- ===== TOP BAR ===== -->
<header class="h-14 bg-white border-b border-line flex items-center px-4 md:px-6 flex-shrink-0 gap-3">
  <button class="topbar-btn md:hidden" onclick="toggleSidebar()" title="菜单">
    <i data-lucide="menu" class="w-[18px] h-[18px]"></i>
  </button>
  <div class="flex items-center gap-2 cursor-pointer flex-shrink-0" onclick="navigate('index.html')">
    <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center"><span class="text-white font-bold text-sm">游</span></div>
    <span class="text-[15px] font-semibold text-ink-title hidden sm:block">游寄后台管理系统</span>
  </div>
  <div class="ml-auto flex items-center gap-3 md:gap-5">
    <button class="topbar-btn" title="任务列表" onclick="navigate('任务中心.html')">
      <i data-lucide="clipboard-list" class="w-[18px] h-[18px]"></i>
      <span class="badge-dot" id="taskBadge" style="display:none;">0</span>
    </button>
    <button class="topbar-btn" title="消息中心" onclick="navigate('消息中心.html')">
      <i data-lucide="bell" class="w-[18px] h-[18px]"></i>
      <span class="badge-dot" id="msgBadge">5</span>
    </button>
    <button class="topbar-btn" title="账号信息" onclick="navigate('账号信息.html')">
      <i data-lucide="user" class="w-[18px] h-[18px]"></i>
    </button>
  </div>
</header>

<!-- ===== BODY: SIDEBAR + CONTENT ===== -->
<div class="flex flex-1 min-h-0">
  <div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar w-[220px] bg-white border-r border-line flex flex-col flex-shrink-0 overflow-y-auto py-2">
    <!-- 工作台 -->
    <div class="menu-item l1" data-page="工作台.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="layout-dashboard" class="w-[15px] h-[15px]"></i></div>工作台
    </div>

    <!-- 数据概览 -->
    <div class="menu-item l1 active-l1" data-page="数据概览.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="bar-chart-3" class="w-[15px] h-[15px]"></i></div>数据概览
    </div>

    <!-- 订单管理 -->
    <div class="menu-item l1" data-page="订单管理.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="package" class="w-[15px] h-[15px]"></i></div>订单管理
    </div>

    <!-- 异常工单 -->
    <div class="menu-item l1" data-page="异常工单.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="alert-triangle" class="w-[15px] h-[15px]"></i></div>异常工单
    </div>

    <!-- 柜机监控 -->
    <div class="menu-item l1" data-page="柜机监控.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="monitor" class="w-[15px] h-[15px]"></i></div>柜机监控
    </div>

    <!-- 对账中心 -->
    <div class="menu-item l1" data-page="对账中心.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="file-text" class="w-[15px] h-[15px]"></i></div>对账中心
    </div>

    <!-- 运营配置 -->
    <div class="menu-item l1" data-page="运营配置.html" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="sliders-horizontal" class="w-[15px] h-[15px]"></i></div>运营配置
    </div>

    <!-- 系统设置（含二级菜单） -->
    <div class="menu-item l1" data-sub="sub-settings" onclick="menuSelect(this)">
      <div class="menu-ico"><i data-lucide="settings" class="w-[15px] h-[15px]"></i></div>系统设置
      <span class="menu-arrow">▼</span>
    </div>
    <div class="submenu collapsed" id="sub-settings" style="max-height:400px;">
      <div class="menu-item l2" data-page="成员管理.html" onclick="menuSelect(this)">成员管理</div>
      <div class="menu-item l2" data-page="部门管理.html" onclick="menuSelect(this)">部门管理</div>
      <div class="menu-item l2" data-page="角色管理.html" onclick="menuSelect(this)">角色管理</div>
      <div class="menu-item l2" data-page="消息设置.html" onclick="menuSelect(this)">消息设置</div>
      <div class="menu-item l2" data-page="账号信息.html" onclick="menuSelect(this)">账号信息</div>
    </div>
  </aside>


  <!-- ===== MAIN CONTENT ===== -->
  <main class="flex-1 bg-bg-page overflow-y-auto" id="mainContent">
    <div class="p-4">

      <!-- ===== Toast ===== -->
      <div id="toast"></div>

      <!-- ===== A: 页面头 ===== -->
      <!-- 区块A：面包屑 + 页面标题 + 最近更新时间 -->
      <div class="bg-white rounded-lg border border-line p-5 md:p-6 mb-4">
        <div class="flex items-center justify-between flex-wrap gap-3">
          <div>
            <div class="text-[12px] text-ink-muted mb-1">数据概览</div>
            <h1 class="text-[22px] font-bold text-ink-title inline-block" data-anno="1">数据概览</h1>
          </div>
          <div class="flex items-center gap-2 text-[12px] text-ink-muted" data-anno="7">
            <i data-lucide="clock" class="w-[13px] h-[13px]"></i>
            <span>数据更新时间：<span id="updateTime" class="font-mono">--</span></span>
            <span class="text-ink-muted">（每5分钟同步一次）</span>
          </div>
        </div>
      </div>

      <!-- ===== B: 时间范围筛选 ===== -->
      <!-- 区块B：快捷时间 + 自定义日期 + 业务类型 + 柜机筛选 -->
      <div class="bg-white rounded-lg border border-line p-5 md:p-6 mb-4">
        <div class="flex flex-wrap items-center gap-3">
          <span class="text-[12px] text-ink-sub flex-shrink-0" data-anno="1">时间范围</span>
          <!-- 快捷时间 pills -->
          <div class="flex flex-wrap gap-1.5" id="quickTimeGroup">
            <button class="filter-pill active" data-range="7d" onclick="selectQuickTime(this)">近 7 天</button>
            <button class="filter-pill" data-range="today" onclick="selectQuickTime(this)">今日</button>
            <button class="filter-pill" data-range="yesterday" onclick="selectQuickTime(this)">昨日</button>
            <button class="filter-pill" data-range="30d" onclick="selectQuickTime(this)">近 30 天</button>
            <button class="filter-pill" data-range="month" onclick="selectQuickTime(this)">本月</button>
          </div>
          <!-- 自定义日期范围 -->
          <span class="text-[12px] text-ink-muted mx-1">|</span>
          <input type="date" id="dateStart" value="2026-06-28" onchange="onCustomDate()" title="开始日期">
          <span class="text-[12px] text-ink-muted">—</span>
          <input type="date" id="dateEnd" value="2026-07-05" onchange="onCustomDate()" title="结束日期">
          <!-- 业务类型 -->
          <span class="text-[12px] text-ink-muted mx-1">|</span>
          <span class="text-[12px] text-ink-sub">业务类型</span>
          <span class="select-wrap">
            <select class="filter-select" id="bizType" onchange="refreshAll()" data-anno="3">
              <option value="all">全部</option>
              <option value="storage">行李寄存</option>
              <option value="delivery">行李寄送</option>
            </select>
          </span>
          <!-- 柜机筛选 -->
          <span class="text-[12px] text-ink-sub">柜机</span>
          <span class="select-wrap">
            <select class="filter-select" id="cabinetFilter" onchange="refreshAll()">
              <option value="all">全部柜机</option>
              <option value="C001">西湖断桥柜机 C001</option>
              <option value="C002">湖滨银泰柜机 C002</option>
              <option value="C003">灵隐寺柜机 C003</option>
              <option value="C004">雷峰塔柜机 C004</option>
              <option value="C005">杭州东站柜机 C005</option>
            </select>
          </span>
        </div>
      </div>

      <!-- ===== C: 核心指标卡（6项） ===== -->
      <!-- 区块C：6个KPI指标卡，含环比 -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4 mb-4" id="kpiCards">
        <!-- JS 动态渲染 -->
      </div>

      <!-- ===== D: 趋势图表 ===== -->
      <!-- 区块D：单量趋势 + 收入趋势，左右并排 -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
        <!-- 单量趋势 -->
        <div class="bg-white rounded-lg border border-line p-5 md:p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-[16px] font-semibold text-ink-title inline-block" data-anno="6">单量趋势</h2>
            <div class="flex gap-1.5" id="orderTrendToggle" data-anno="7">
              <button class="filter-pill active" data-mode="total" onclick="switchOrderTrend(this,'total')">总计</button>
              <button class="filter-pill" data-mode="split" onclick="switchOrderTrend(this,'split')">寄存/寄送分线</button>
            </div>
          </div>
          <div class="chart-wrap" style="height:280px;">
            <canvas id="orderTrendChart"></canvas>
          </div>
        </div>
        <!-- 收入趋势 -->
        <div class="bg-white rounded-lg border border-line p-5 md:p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-[16px] font-semibold text-ink-title inline-block" data-anno="8">收入趋势</h2>
          </div>
          <div class="chart-wrap" style="height:280px;">
            <canvas id="revenueTrendChart"></canvas>
          </div>
        </div>
      </div>

      <!-- ===== E: 结构拆分 ===== -->
      <!-- 区块E：4个维度拆分（业务类型/订单来源/柜型/柜机Top） -->
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 mb-4">
        <!-- 业务类型占比 -->
        <div class="bg-white rounded-lg border border-line p-5 md:p-6">
          <h2 class="text-[16px] font-semibold text-ink-title mb-3 inline-block" data-anno="9">业务类型占比</h2>
          <div class="chart-wrap" style="height:200px;">
            <canvas id="bizTypeChart"></canvas>
          </div>
        </div>
        <!-- 订单来源占比 -->
        <div class="bg-white rounded-lg border border-line p-5 md:p-6">
          <h2 class="text-[16px] font-semibold text-ink-title mb-3 inline-block" data-anno="10">订单来源占比</h2>
          <div class="chart-wrap" style="height:200px;">
            <canvas id="sourceChart"></canvas>
          </div>
        </div>
        <!-- 柜型占比 -->
        <div class="bg-white rounded-lg border border-line p-5 md:p-6">
          <h2 class="text-[16px] font-semibold text-ink-title mb-3 inline-block" data-anno="11">柜型占比</h2>
          <div class="chart-wrap" style="height:200px;">
            <canvas id="cabinetSizeChart"></canvas>
          </div>
        </div>
        <!-- 柜机 Top 排行 -->
        <div class="bg-white rounded-lg border border-line p-5 md:p-6">
          <h2 class="text-[16px] font-semibold text-ink-title mb-3 inline-block" data-anno="12">柜机 Top 5</h2>
          <div class="chart-wrap" style="height:200px;">
            <canvas id="cabinetTopChart"></canvas>
          </div>
        </div>
      </div>

      <!-- ===== F: 来源占比强调区 ===== -->
      <!-- 区块F：自有小程序承接占比 重点强调 -->
      <div class="bg-white rounded-lg border border-line p-5 md:p-6">
        <h2 class="text-[16px] font-semibold text-ink-title mb-1 inline-block" data-anno="13">自有小程序承接占比</h2>
        <p class="text-[12px] text-ink-sub mb-5">反映用户入口从「小铁小程序」向「自有小程序」迁移的进展，是衡量入口迁移战略成效的核心指标</p>
        <div class="flex flex-col lg:flex-row items-center gap-6">
          <!-- 环形图 -->
          <div class="chart-wrap" style="width:180px;height:180px;flex-shrink:0;">
            <canvas id="emphasisRingChart"></canvas>
          </div>
          <!-- 数据说明 -->
          <div class="flex-1 grid grid-cols-1 sm:grid-cols-3 gap-4 w-full">
            <div class="text-center p-4 rounded-md bg-primary-bg">
              <div class="text-[12px] text-ink-sub mb-1">自有小程序订单</div>
              <div class="text-[28px] font-bold text-primary font-mono" id="emSelfCount">--</div>
              <div class="text-[13px] font-semibold text-primary mt-1" id="emSelfPct">--</div>
            </div>
            <div class="text-center p-4 rounded-md bg-bg-page">
              <div class="text-[12px] text-ink-sub mb-1">小铁小程序订单</div>
              <div class="text-[28px] font-bold text-ink-title font-mono" id="emXtCount">--</div>
              <div class="text-[13px] font-semibold text-ink-sub mt-1" id="emXtPct">--</div>
            </div>
            <div class="text-center p-4 rounded-md bg-success-bg">
              <div class="text-[12px] text-ink-sub mb-1">自有占比趋势</div>
              <div class="text-[28px] font-bold text-success font-mono" id="emTrend">--</div>
              <div class="text-[13px] font-semibold text-success mt-1" id="emTrendLabel">--</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- ===== PORTAL ANNOTATION LAYER ===== -->
<div id="annoLayer" style="position:fixed;inset:0;pointer-events:none;z-index:9998;"></div>

<!-- Annotation toggle -->
<div id="annoToggle" class="fixed z-[150]" style="right:8px;bottom:40px;cursor:grab;" onmousedown="startDragToggle(event)">
  <div class="flex items-center gap-1 px-2.5 py-1.5 rounded-full text-[11px] bg-white/90 backdrop-blur text-primary border border-primary/30 shadow-sm">
    <i data-lucide="eye" id="annoToggleIcon" class="w-[13px] h-[13px]"></i> 标注
  </div>
</div>

<!-- Annotation popup -->
<div id="annoPopup" class="hidden fixed inset-0 z-[9999]" style="background:rgba(0,0,0,.2);" onclick="closeAnnoPopup()">
  <div id="annoPopupBox" class="fixed bg-white rounded-lg shadow-xl p-6 w-[480px] max-w-[90vw] max-h-[70vh] overflow-y-auto"
       style="top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 12px 40px rgba(0,0,0,.18);"
       onclick="event.stopPropagation()">
    <button onclick="closeAnnoPopup()" class="absolute top-3 right-3 w-8 h-8 flex items-center justify-center rounded hover:bg-bg-hover text-ink-muted z-10"><i data-lucide="x" class="w-[20px] h-[20px]"></i></button>
    <div id="annoPopupDrag" class="flex items-center gap-2 mb-3 select-none" style="cursor:grab;" onmousedown="startDragPopup(event)" title="拖拽移动弹窗">

<script>
/* ================================================================
   MOCK DATA — 30 天经营数据，贴合游寄业务
   ================================================================ */
var MOCK_DAYS = [];
(function generateMockData() {
  var base = new Date(2026, 5, 6); // 2026-06-06
  var storageRatio = 0.62; // 寄存占比起始
  var selfRatio = 0.38;    // 自有占比起始
  for (var i = 0; i < 30; i++) {
    var d = new Date(base);
    d.setDate(d.getDate() + i);
    var dayStr = d.toISOString().slice(0, 10);
    var dayOfWeek = d.getDay();

    // 周末单量略高
    var isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
    var totalOrders = isWeekend
      ? Math.floor(Math.random() * 120 + 180)  // 180-300
      : Math.floor(Math.random() * 100 + 120); // 120-220

    // 寄存 vs 寄送
    var storageOrders = Math.floor(totalOrders * (storageRatio + (Math.random() - 0.5) * 0.06));
    var deliveryOrders = totalOrders - storageOrders;

    // 自有 vs 小铁（自有占比缓慢上升）
    var selfTrend = selfRatio + (i * 0.003) + (Math.random() - 0.5) * 0.02;
    selfTrend = Math.max(0.3, Math.min(0.55, selfTrend));
    var selfOrders = Math.floor(totalOrders * selfTrend);
    var xtOrders = totalOrders - selfOrders;

    // 柜型分布
    var smallOrders = Math.floor(totalOrders * (0.25 + Math.random() * 0.1));
    var mediumOrders = Math.floor(totalOrders * (0.4 + Math.random() * 0.1));
    var largeOrders = totalOrders - smallOrders - mediumOrders;

    // 客单价
    var avgPrice = isWeekend ? 18 + Math.random() * 8 : 15 + Math.random() * 6;
    var revenue = Math.round(totalOrders * avgPrice * 100) / 100;

    // 异常数
    var anomalyRate = 0.02 + Math.random() * 0.04;
    var anomalyCount = Math.floor(totalOrders * anomalyRate);

    MOCK_DAYS.push({
      date: dayStr,
      dayOfWeek: dayOfWeek,
      totalOrders: totalOrders,
      storageOrders: storageOrders,
      deliveryOrders: deliveryOrders,
      selfOrders: selfOrders,
      xtOrders: xtOrders,
      smallOrders: smallOrders,
      mediumOrders: mediumOrders,
      largeOrders: largeOrders,
      revenue: revenue,
      anomalyCount: anomalyCount
    });
  }
})();

/* Cabinet mock data */
var MOCK_CABINETS = [
  { id: 'C001', name: '西湖断桥柜机 C001', totalSlots: 48, usedSlots: 41 },
  { id: 'C002', name: '湖滨银泰柜机 C002', totalSlots: 64, usedSlots: 52 },
  { id: 'C003', name: '灵隐寺柜机 C003', totalSlots: 36, usedSlots: 28 },
  { id: 'C004', name: '雷峰塔柜机 C004', totalSlots: 48, usedSlots: 35 },
  { id: 'C005', name: '杭州东站柜机 C005', totalSlots: 72, usedSlots: 63 },
];

/* Get current filtered data based on selected time range */
function getFilteredData() {
  var range = document.querySelector('#quickTimeGroup .filter-pill.active');
  var rangeVal = range ? range.getAttribute('data-range') : '7d';
  var bizType = document.getElementById('bizType').value;
  var cabinet = document.getElementById('cabinetFilter').value;
  var now = new Date(2026, 6, 5); // "today" = 2026-07-05
  var startD, endD;

  if (rangeVal === 'custom') {
    startD = new Date(document.getElementById('dateStart').value);
    endD = new Date(document.getElementById('dateEnd').value);
  } else {
    switch (rangeVal) {
      case 'today':
        startD = new Date(2026, 6, 5);
        endD = new Date(2026, 6, 5);
        break;
      case 'yesterday':
        startD = new Date(2026, 6, 4);
        endD = new Date(2026, 6, 4);
        break;
      case '7d':
        startD = new Date(2026, 5, 28);
        endD = new Date(2026, 6, 5);
        break;
      case '30d':
        startD = new Date(2026, 5, 5);
        endD = new Date(2026, 6, 5);
        break;
      case 'month':
        startD = new Date(2026, 6, 1);
        endD = new Date(2026, 6, 5);
        break;
      default:
        startD = new Date(2026, 5, 28);
        endD = new Date(2026, 6, 5);
    }
  }

  var days = MOCK_DAYS.filter(function(d) {
    var date = new Date(d.date);
    return date >= startD && date <= endD;
  });

  // Apply biz type scaling
  if (bizType === 'storage') {
    days = days.map(function(d) {
      var n = Object.assign({}, d);
      n.totalOrders = d.storageOrders;
      n.revenue = Math.round(d.revenue * (d.storageOrders / d.totalOrders) * 100) / 100;
      return n;
    });
  } else if (bizType === 'delivery') {
    days = days.map(function(d) {
      var n = Object.assign({}, d);
      n.totalOrders = d.deliveryOrders;
      n.revenue = Math.round(d.revenue * (d.deliveryOrders / d.totalOrders) * 100) / 100;
      return n;
    });
  }

  return days;
}

/* ================================================================
   MENU SELECT — unified sidebar menu interaction handler
   ================================================================ */
function menuSelect(el) {
  if (el.classList.contains('l1')) {
    handleL1(el);
  } else if (el.classList.contains('l2')) {
    handleL2(el);
  }
}

function handleL1(el) {
  var subId = el.getAttribute('data-sub');
  if (subId) {
    handleL1Toggle(el, subId);
  } else {
    selectL1NoChildren(el);
  }
}

function handleL1Toggle(el, subId) {
  var sub = document.getElementById(subId);
  if (!sub) return;
  var arrow = el.querySelector('.menu-arrow');
  var isExpanded = !sub.classList.contains('collapsed');
  if (isExpanded) {
    sub.classList.add('collapsed');
    if (arrow) arrow.classList.remove('open');
    if (!sub.querySelector('.menu-item.active-l2')) {
      el.classList.remove('active-l1');
    }
  } else {
    collapseAllExcept(subId);
    sub.classList.remove('collapsed');
    if (arrow) arrow.classList.add('open');
    if (sub.querySelector('.menu-item.active-l2')) {
      el.classList.add('active-l1');
    }
  }
}

function selectL1NoChildren(el) {
  collapseAllExcept(null);
  clearAllActive();
  el.classList.add('active-l1');
  var page = el.getAttribute('data-page');
  navigateToPage(page);
}

function handleL2(el) {
  var parentSub = el.closest('.submenu');
  var parentSubId = parentSub ? parentSub.id : null;
  collapseAllExcept(parentSubId);
  if (parentSub && parentSub.classList.contains('collapsed')) {
    parentSub.classList.remove('collapsed');
  }
  clearAllActive();
  el.classList.add('active-l2');
  var parentL1 = findParentL1BySubId(parentSubId);
  if (parentL1) {
    parentL1.classList.add('active-l1');
    var arrow = parentL1.querySelector('.menu-arrow');
    if (arrow) arrow.classList.add('open');
  }
  var page = el.getAttribute('data-page');
  navigateToPage(page);
}

function collapseAllExcept(keepSubId) {
  document.querySelectorAll('.submenu').forEach(function(sub) {
    if (sub.id === keepSubId) return;
    if (sub.classList.contains('collapsed')) return;
    sub.classList.add('collapsed');
    var l1 = findParentL1BySubId(sub.id);
    if (l1) {
      var arrow = l1.querySelector('.menu-arrow');
      if (arrow) arrow.classList.remove('open');
      if (!sub.querySelector('.menu-item.active-l2')) {
        l1.classList.remove('active-l1');
      }
    }
  });
}

function clearAllActive() {
  document.querySelectorAll('.menu-item').forEach(function(item) {
    item.classList.remove('active-l1', 'active-l2');
  });
}

function findParentL1BySubId(subId) {
  if (!subId) return null;
  return document.querySelector('.menu-item.l1[data-sub="' + subId + '"]');
}

function navigateToPage(page) {
  if (!page) return;
  // Guard: skip if already on this page (prevents file:// self-navigation error)
  var fname = page.split("/").pop();
  var cur = window.location.pathname.split("/").pop();
  if (fname === cur) return;
  if (page.endsWith('.html')) {
    window.location.href = page;
  } else {
    document.getElementById('mainContent').innerHTML =
      '<div class="p-4">' +
      '<div class="bg-white rounded-lg border border-line p-5 md:p-6">' +
      '<h2 class="text-[16px] font-semibold text-ink-title mb-2">' + page + '</h2>' +
      '<p class="text-[14px] text-ink-muted">该页面开发中，敬请期待。</p>' +
      '</div></div>';
  }
}

function navigate(url) {
  if (url === '#') return;
  // Guard: skip if already on this page (prevents file:// self-navigation error)
  var fname = url.split("/").pop();
  var cur = window.location.pathname.split("/").pop();
  if (fname === cur) return;
  window.location.href = url;
}

function toggleSidebar() {
  var sb = document.getElementById('sidebar');
  var overlay = document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  overlay.classList.toggle('show');
}

/* ================================================================
   INTERACTION: Time Range Filter
   ================================================================ */
function selectQuickTime(btn) {
  document.querySelectorAll('#quickTimeGroup .filter-pill').forEach(function(b) {
    b.classList.remove('active');
  });

function onCustomDate() {

  document.querySelectorAll('#quickTimeGroup .filter-pill').forEach(function(b) {
    b.classList.remove('active');

/* ================================================================
   KPI Cards Rendering
   ================================================================ */
function renderKPICards() {
  var days = getFilteredData();
  var container = document.getElementById('kpiCards');
  if (days.length === 0) {
    container.innerHTML = '<div class="col-span-full text-center py-8 text-ink-muted"><i data-lucide="inbox" class="w-[32px] h-[32px] mx-auto mb-2"></i><p class="text-[13px]">所选周期暂无数据</p></div>';
    lucide.createIcons();
    return;
  }

  // Calculate KPIs
  var totalOrders = days.reduce(function(s, d) { return s + d.totalOrders; }, 0);
  var totalRevenue = days.reduce(function(s, d) { return s + d.revenue; }, 0);
  var totalStorage = days.reduce(function(s, d) { return s + d.storageOrders; }, 0);
  var totalDelivery = days.reduce(function(s, d) { return s + d.deliveryOrders; }, 0);
  var totalSelf = days.reduce(function(s, d) { return s + d.selfOrders; }, 0);
  var totalAnomaly = days.reduce(function(s, d) { return s + d.anomalyCount; }, 0);

  // Cabinet usage
  var totalSlots = MOCK_CABINETS.reduce(function(s, c) { return s + c.totalSlots; }, 0);
  var usedSlots = MOCK_CABINETS.reduce(function(s, c) { return s + c.usedSlots; }, 0);
  var usageRate = (usedSlots / totalSlots * 100);

  // Ratios
  var anomalyRate = totalOrders > 0 ? (totalAnomaly / totalOrders * 100) : 0;
  var storagePct = totalOrders > 0 ? (totalStorage / totalOrders * 100) : 0;
  var deliveryPct = totalOrders > 0 ? (totalDelivery / totalOrders * 100) : 0;
  var selfPct = totalOrders > 0 ? (totalSelf / totalOrders * 100) : 0;

  // QoQ comparison (simplified — compare first half vs second half)
  var mid = Math.floor(days.length / 2);
  var firstHalf = days.slice(0, mid);
  var secondHalf = days.slice(mid);
  var firstOrders = firstHalf.reduce(function(s, d) { return s + d.totalOrders; }, 0);
  var secondOrders = secondHalf.reduce(function(s, d) { return s + d.totalOrders; }, 0);
  var orderQoQ = firstOrders > 0 ? ((secondOrders - firstOrders) / firstOrders * 100) : 0;
  var firstRevenue = firstHalf.reduce(function(s, d) { return s + d.revenue; }, 0);
  var secondRevenue = secondHalf.reduce(function(s, d) { return s + d.revenue; }, 0);
  var revenueQoQ = firstRevenue > 0 ? ((secondRevenue - firstRevenue) / firstRevenue * 100) : 0;

  var isAnomalyHigh = anomalyRate > 5;

  var cards = [
    {
      title: '订单量',
      value: totalOrders.toLocaleString(),
      icon: 'package',
      sub: formatQoQ(orderQoQ, '单'),
      drillPage: '订单管理.html',
      cls: ''
    },
    {
      title: '营业收入',
      value: '¥' + totalRevenue.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }),
      icon: 'dollar-sign',
      sub: formatQoQ(revenueQoQ, '元'),
      drillPage: '订单管理.html',
      cls: ''
    },
    {
      title: '柜点使用率',
      value: usageRate.toFixed(1) + '%',
      icon: 'hard-drive',
      sub: usedSlots + ' / ' + totalSlots + ' 格口已占用',
      drillPage: null,
      cls: ''
    },
    {
      title: '异常率',
      value: anomalyRate.toFixed(2) + '%',
      icon: 'alert-triangle',
      sub: totalAnomaly + ' 单异常',
      drillPage: '异常工单.html',
      cls: isAnomalyHigh ? 'danger-highlight' : ''
    },
    {
      title: '寄存/寄送结构',
      value: storagePct.toFixed(0) + '% · ' + deliveryPct.toFixed(0) + '%',
      icon: 'git-branch',
      sub: '寄存 ' + totalStorage + ' 单 · 寄送 ' + totalDelivery + ' 单',
      drillPage: null,
      cls: ''
    },
    {
      title: '自有承接占比',
      value: selfPct.toFixed(1) + '%',
      icon: 'smartphone',
      sub: '自有 ' + totalSelf + ' 单 / 小铁 ' + (totalOrders - totalSelf) + ' 单',
      drillPage: null,
      cls: ''
    }
  ];

  container.innerHTML = cards.map(function(c, i) {
    // anno 3=订单量钻, 5=通用指标卡, 6=异常率预警
    var anno = [3, 5, 5, 6, 5, 5][i];
    // 所有卡片的标题都加标注（根据卡片不同使用不同编号）
    var annoAttr = ' data-anno="' + anno + '"';
    var annoClass = ' inline-block';
    return '<div class="kpi-card ' + c.cls + '" onclick="drillKPI(\'' + (c.drillPage || '') + '\', \'' + c.title + '\')">' +
      '<div class="flex items-center justify-between mb-1">' +
        '<span class="text-[12px] text-ink-sub' + annoClass + '"' + annoAttr + '>' + c.title + '</span>' +
        '<i data-lucide="' + c.icon + '" class="w-[15px] h-[15px] text-ink-muted"></i>' +
      '</div>' +
      '<div class="text-[22px] font-bold text-ink-title font-mono truncate" style="line-height:1.3;">' + c.value + '</div>' +
      '<div class="text-[11px] text-ink-sub mt-1">' + c.sub + '</div>' +
    '</div>';
  }).join('');

  // Update time display
  document.getElementById('updateTime').textContent = '2026-07-05 09:32:15';

  lucide.createIcons();
}

function formatQoQ(rate, unit) {
  if (Math.abs(rate) < 0.1) return '环比持平';
  var cls = rate > 0 ? 'text-success' : 'text-danger';
  var arrow = rate > 0 ? '↑' : '↓';
  return '<span class="' + cls + '">' + arrow + ' ' + Math.abs(rate).toFixed(1) + '%</span>（环比）';
}

function drillKPI(page, title) {
  if (page) {
    navigate(page);
  } else {
    showToast('"' + title + '" 下钻明细功能开发中，敬请期待');
  }
}

/* ================================================================
   Toast
   ================================================================ */
function showToast(msg) {
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(function() {
    toast.classList.remove('show');
  }, 2000);
}

/* ================================================================
   CHARTS — Chart.js
   ================================================================ */
var CHART_COLORS = {
  primary: '#0066FF',
  primaryLight: 'rgba(0,102,255,.12)',
  success: '#0FC060',
  successLight: 'rgba(15,192,96,.12)',
  warning: '#E7772D',
  warningLight: 'rgba(231,119,45,.12)',
  info: '#0091D5',
  infoLight: 'rgba(0,145,213,.12)',
  danger: '#D9001B',
  inkMuted: '#9DA2AC',
  lineLight: '#E8EAED'
};

var orderTrendChartInst = null;
var revenueTrendChartInst = null;
var bizTypeChartInst = null;
var sourceChartInst = null;
var cabinetSizeChartInst = null;
var cabinetTopChartInst = null;
var emphasisRingChartInst = null;
var orderTrendMode = 'total';

function renderOrderTrendChart() {
  if (typeof Chart === 'undefined') return;
  try {
  var days = getFilteredData();
  var labels = days.map(function(d) { return d.date.slice(5); }); // MM-DD
  var ctx = document.getElementById('orderTrendChart').getContext('2d');

  var datasets;
  if (orderTrendMode === 'total') {
    datasets = [{
      label: '订单量',
      data: days.map(function(d) { return d.totalOrders; }),
      borderColor: CHART_COLORS.primary,
      backgroundColor: CHART_COLORS.primaryLight,
      borderWidth: 2,
      pointRadius: 3,
      pointBackgroundColor: CHART_COLORS.primary,
      fill: true,
      tension: 0.3
    }];
  } else {
    datasets = [
      {
        label: '行李寄存',
        data: days.map(function(d) { return d.storageOrders; }),
        borderColor: CHART_COLORS.primary,
        backgroundColor: 'transparent',
        borderWidth: 2,
        pointRadius: 3,
        pointBackgroundColor: CHART_COLORS.primary,
        fill: false,
        tension: 0.3
      },
      {
        label: '行李寄送',
        data: days.map(function(d) { return d.deliveryOrders; }),
        borderColor: CHART_COLORS.success,
        backgroundColor: 'transparent',
        borderWidth: 2,
        pointRadius: 3,
        pointBackgroundColor: CHART_COLORS.success,
        fill: false,
        tension: 0.3
      }
    ];
  }

  if (orderTrendChartInst) orderTrendChartInst.destroy();
  orderTrendChartInst = new Chart(ctx, {
    type: 'line',
    data: { labels: labels, datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: orderTrendMode === 'split', position: 'bottom', labels: { boxWidth: 12, padding: 16, font: { size: 11 }, color: '#6E7685' } },
        tooltip: {
          backgroundColor: '#1A1D24',
          titleFont: { size: 12 },
          bodyFont: { size: 12, family: "'JetBrains Mono',monospace" },
          padding: 10,
          cornerRadius: 4
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#9DA2AC', maxRotation: 45 } },
        y: { grid: { color: '#E8EAED' }, ticks: { font: { size: 11 }, color: '#9DA2AC' }, beginAtZero: true }
      }
    }
  });
  } catch(e) { console.warn('订单趋势图渲染失败:', e); }
}

  if (typeof Chart === 'undefined') return;
  try {

function switchOrderTrend(btn, mode) {
  document.querySelectorAll('#orderTrendToggle .filter-pill').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');

      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,

        tooltip: {
          backgroundColor: '#1A1D24',
          callbacks: { label: function(ctx) { return ctx.label + ': ' + ctx.raw + ' 单 (' + ((ctx.raw / (totalStorage + totalDelivery)) * 100).toFixed(1) + '%)'; } }
        }
      }
    }
  });
}

function renderSourceChart() {
  var days = getFilteredData();
  var totalSelf = days.reduce(function(s, d) { return s + d.selfOrders; }, 0);
  var totalXt = days.reduce(function(s, d) { return s + d.xtOrders; }, 0);
  var ctx = document.getElementById('sourceChart').getContext('2d');

  if (sourceChartInst) sourceChartInst.destroy();
  sourceChartInst = new Chart(ctx, {
    type: 'doughnut',
    data: {

function renderEmphasisRingChart() {
  var days = getFilteredData();
  var totalSelf = days.reduce(function(s, d) { return s + d.selfOrders; }, 0);
  var totalXt = days.reduce(function(s, d) { return s + d.xtOrders; }, 0);
  var total = totalSelf + totalXt;
  var selfPct = total > 0 ? (totalSelf / total * 100) : 0;
  var ctx = document.getElementById('emphasisRingChart').getContext('2d');

  // Update text stats
  document.getElementById('emSelfCount').textContent = totalSelf.toLocaleString();
  document.getElementById('emSelfPct').textContent = '占比 ' + selfPct.toFixed(1) + '%';
  document.getElementById('emXtCount').textContent = totalXt.toLocaleString();
  document.getElementById('emXtPct').textContent = '占比 ' + (100 - selfPct).toFixed(1) + '%';

  // Trend: compare first 15 days vs last 15 days
  var mid = Math.floor(days.length / 2);
  var firstHalf = days.slice(0, mid);
  var secondHalf = days.slice(mid);
  var firstSelf = firstHalf.reduce(function(s, d) { return s + d.selfOrders; }, 0);
  var firstTotal = firstHalf.reduce(function(s, d) { return s + d.totalOrders; }, 0);
  var secondSelf = secondHalf.reduce(function(s, d) { return s + d.selfOrders; }, 0);
  var secondTotal = secondHalf.reduce(function(s, d) { return s + d.totalOrders; }, 0);
  var firstRatio = firstTotal > 0 ? (firstSelf / firstTotal * 100) : 0;
  var secondRatio = secondTotal > 0 ? (secondSelf / secondTotal * 100) : 0;
  var trendDiff = secondRatio - firstRatio;

  var trendEl = document.getElementById('emTrend');
  var trendLabelEl = document.getElementById('emTrendLabel');
  if (trendDiff > 0.5) {
    trendEl.textContent = '↑ ' + trendDiff.toFixed(1) + 'pp';
    trendEl.className = 'text-[28px] font-bold text-success font-mono';
    trendLabelEl.textContent = '自有占比上升中';
    trendLabelEl.className = 'text-[13px] font-semibold text-success mt-1';
  } else if (trendDiff < -0.5) {
    trendEl.textContent = '↓ ' + Math.abs(trendDiff).toFixed(1) + 'pp';
    trendEl.className = 'text-[28px] font-bold text-danger font-mono';
    trendLabelEl.textContent = '自有占比下降，需关注';
    trendLabelEl.className = 'text-[13px] font-semibold text-danger mt-1';
  } else {
    trendEl.textContent = '→ 持平';
    trendEl.className = 'text-[28px] font-bold text-ink-sub font-mono';
    trendLabelEl.textContent = '占比基本稳定';
    trendLabelEl.className = 'text-[13px] font-semibold text-ink-sub mt-1';
  }

  if (emphasisRingChartInst) emphasisRingChartInst.destroy();
  emphasisRingChartInst = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['自有小程序', '小铁小程序'],
      datasets: [{
        data: [totalSelf, totalXt],
        backgroundColor: [CHART_COLORS.primary, CHART_COLORS.inkMuted],
        borderColor: '#fff',
        borderWidth: 3,
        cutout: '65%'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1A1D24',
          callbacks: { label: function(ctx) { return ctx.label + ': ' + ctx.raw + ' 单 (' + ((ctx.raw / total) * 100).toFixed(1) + '%)'; } }
        }
      }
    }
  });
}

var annoVisible = true;

function renderAnnoBadges() {
  var layer = document.getElementById('annoLayer');
  layer.innerHTML = '';
  if (!annoVisible) return;
  var vw = window.innerWidth;
  document.querySelectorAll('[data-anno]').forEach(function(el) {
    var id = el.getAttribute('data-anno');
    if (el.offsetParent === null && el.tagName !== 'BODY') return;
    var target = resolveAnnoTarget(el, vw);
    var rect = target.getBoundingClientRect();
    if (rect.width === 0 && rect.height === 0) return;
    var badge = document.createElement('div');
    badge.className = 'anno-portal-badge';
    badge.textContent = id;
    badge.style.top  = (rect.top  - 10) + 'px';
    badge.style.left = (rect.right - 10) + 'px';
    badge.addEventListener('click', function(e) {
      e.stopPropagation();
      showAnnoPopup(id);
    });
    layer.appendChild(badge);
  });
}

function resolveAnnoTarget(el, vw) {
  var rect = el.getBoundingClientRect();
  if (rect.width < 800 || rect.width < vw * 0.7) return el;
  var inner = el.querySelector('h1, h2, h3, h4, h5, h6, button, .btn, input, select, .card-title, [class*="title"]');
  if (inner) {
    var innerRect = inner.getBoundingClientRect();
    if (innerRect.width < rect.width * 0.8) return inner;
  }
  var first = el.firstElementChild;
  if (first) {
    var firstRect = first.getBoundingClientRect();
    if (firstRect.width < rect.width * 0.9) return first;
  }
  return el;
}

function showAnnoPopup(id) {
  var a = annotations[id];
  if (!a) return;
  document.getElementById('annoPopupTitle').textContent = '#' + id + ' ' + a.title;
  document.getElementById('annoPopupBody').innerHTML = a.desc.map(function(d) {
    return '<li class="flex items-start gap-2"><span class="text-primary font-bold flex-shrink-0">•</span><span>' + d + '</span></li>';
  }).join('');
  var box = document.getElementById('annoPopupBox');
  box.style.top = '50%'; box.style.left = '50%'; box.style.transform = 'translate(-50%,-50%)';
  document.getElementById('annoPopup').classList.remove('hidden');
}

function closeAnnoPopup() {
  document.getElementById('annoPopup').classList.add('hidden');
}

/* Drag popup */
var popupDrag = { offX: 0, offY: 0, moved: false };
function startDragPopup(e) {
  if (e.target.closest('button')) return;
  popupDrag.moved = false;
  var box = document.getElementById('annoPopupBox');
  var rect = box.getBoundingClientRect();
  popupDrag.offX = e.clientX - rect.left;
  popupDrag.offY = e.clientY - rect.top;
  document.addEventListener('mousemove', onDragPopup);
  document.addEventListener('mouseup', stopDragPopup);
}
function onDragPopup(e) {
  var dx = Math.abs(e.clientX - popupDrag.offX - document.getElementById('annoPopupBox').getBoundingClientRect().left);
  if (dx < 3 && !popupDrag.moved) return;
  popupDrag.moved = true;
  var box = document.getElementById('annoPopupBox');
  box.style.transform = 'none';
  box.style.top  = Math.max(0, Math.min(window.innerHeight - 100, e.clientY - popupDrag.offY)) + 'px';
  box.style.left = Math.max(0, Math.min(window.innerWidth  - 100, e.clientX - popupDrag.offX)) + 'px';
  document.getElementById('annoPopupDrag').style.cursor = 'grabbing';
}
function stopDragPopup() {
  document.removeEventListener('mousemove', onDragPopup);
  document.removeEventListener('mouseup', stopDragPopup);
  var h = document.getElementById('annoPopupDrag');
  if (h) h.style.cursor = 'grab';
}

/* Toggle annotations */
document.getElementById('annoToggle').addEventListener('click', function(e) {
  if (this.dataset.dragging === '1') return;
  annoVisible = !annoVisible;
  if (annoVisible) {
    document.body.classList.remove('anno-hidden');
    document.getElementById('annoToggleIcon').setAttribute('data-lucide', 'eye');
  } else {
    document.body.classList.add('anno-hidden');
    document.getElementById('annoToggleIcon').setAttribute('data-lucide', 'eye-off');
  }
  lucide.createIcons({ attrs: { class: 'w-[13px] h-[13px]' } });
  renderAnnoBadges();
});

/* Drag toggle */
var dragToggleY = 0, dragToggleMoved = false;
function startDragToggle(e) {
  dragToggleY = e.clientY; dragToggleMoved = false;
  document.addEventListener('mousemove', onDragToggle);
  document.addEventListener('mouseup', stopDragToggle); e.preventDefault();
}
function onDragToggle(e) {
  if (Math.abs(e.clientY - dragToggleY) < 5) return;
  dragToggleMoved = true;
  var w = document.getElementById('annoToggle');
  w.style.top = Math.max(60, Math.min(window.innerHeight - 60, e.clientY - 20)) + 'px';
  w.style.right = '8px'; w.style.cursor = 'grabbing';
}
function stopDragToggle() {
  document.removeEventListener('mousemove', onDragToggle);
  document.removeEventListener('mouseup', stopDragToggle);
  var w = document.getElementById('annoToggle');
  if (w) { w.style.cursor = 'grab'; w.dataset.dragging = dragToggleMoved ? '1' : ''; }
}
