9px;background:#0066FF;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;letter-spacing:-.02em;\">游寄</div>\n      <span style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#0066FF;background:#E6F0FF;padding:5px 10px;border-radius:5px;\">DESIGN SYSTEM v2.0</span>\n    </div>\n    <h1 style=\"font-size:30px;font-weight:700;color:#1A1D24;letter-spacing:-.02em;\">湖滨行李安心游 · 后台管理系统</h1>\n    <p style=\"font-size:14px;color:#6E7685;margin-top:10px;max-width:720px;\">面向运营 / 客服 / 柜机管理人员的 B 端工具型界面 —— 专业、高效、信息密度高。方向 Tech&nbsp;/&nbsp;Utility，克制冷静，让位于数据本身。桌面 1440px 基准。</p>\n    <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;\">\n      <span style=\"font:12px/1 'JetBrains Mono',monospace;color:#6E7685;background:#fff;border:1px solid #DFE1E5;padding:6px 11px;border-radius:5px;\">Primary #0066FF</span>\n      <span style=\"font:12px/1 'JetBrains Mono',monospace;color:#6E7685;background:#fff;border:1px solid #DFE1E5;padding:6px 11px;border-radius:5px;\">Sidebar 210 · Topbar 70</span>\n      <span style=\"font:12px/1 'JetBrains Mono',monospace;color:#6E7685;background:#fff;border:1px solid #DFE1E5;padding:6px 11px;border-radius:5px;\">Content max 1280 · pad 20</span>\n      <span style=\"font:12px/1 'JetBrains Mono',monospace;color:#6E7685;background:#fff;border:1px solid #DFE1E5;padding:6px 11px;border-radius:5px;\">Grid base 4px</span>\n    </div>\n  </header>\n\n  <!-- ============ 01 色板 ============ -->\n  <section style=\"margin-bottom:56px;\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid #DFE1E5;\">\n      <span style=\"font:700 13px/1 'JetBrains Mono',monospace;color:#0066FF;\">01</span>\n      <h2 style=\"font-size:19px;font-weight:600;color:#1A1D24;\">色板 Color</h2>\n    </div>\n\n    <div style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#6E7685;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;\">主色 · Primary #0066FF</div>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;\">\n      <sc-for list=\"{{ primaryColors }}\" as=\"c\" hint-placeholder-count=\"5\">\n        <div style=\"border-radius:6px;overflow:hidden;border:1px solid #DFE1E5;background:#fff;\">\n          <div style=\"height:60px;background:{{ c.hex }};\"></div>\n          <div style=\"padding:9px 12px;\">\n            <div style=\"font:600 11px/1.3 'JetBrains Mono',monospace;color:#3A3F4A;\">{{ c.name }}</div>\n            <div style=\"font:11px/1.4 'JetBrains Mono',monospace;color:#9DA2AC;margin-top:3px;\">{{ c.val }}</div>\n          </div>\n        </div>\n      </sc-for>\n    </div>\n\n    <div style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#6E7685;text-transform:uppercase;letter-spacing:.05em;margin:28px 0 12px;\">中性灰阶 · Neutral（9 级 + 白）</div>\n    <div style=\"border:1px solid #DFE1E5;border-radius:6px;overflow:hidden;background:#fff;\">\n      <sc-for list=\"{{ grayColors }}\" as=\"c\" hint-placeholder-count=\"10\">\n        <div style=\"display:flex;align-items:center;gap:16px;padding:10px 16px;border-bottom:1px solid #F0F1F3;\">\n          <div style=\"width:56px;height:32px;border-radius:5px;flex-shrink:0;background:{{ c.hex }};border:1px solid #E8EAED;\"></div>\n          <span style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#3A3F4A;min-width:78px;\">{{ c.name }}</span>\n          <span style=\"font:12px/1 'JetBrains Mono',monospace;color:#9DA2AC;min-width:80px;\">{{ c.hex }}</span>\n          <span style=\"font-size:12px;color:#6E7685;\">{{ c.use }}</span>\n        </div>\n      </sc-for>\n    </div>\n\n    <div style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#6E7685;text-transform:uppercase;letter-spacing:.05em;margin:28px 0 12px;\">状态色 · Status</div>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;\">\n      <sc-for list=\"{{ statusColors }}\" as=\"c\" hint-placeholder-count=\"4\">\n        <div style=\"border:1px solid #DFE1E5;border-radius:6px;overflow:hidden;background:#fff;\">\n          <div style=\"display:flex;\">\n            <div style=\"flex:1;height:52px;background:{{ c.hex }};\"></div>\n            <div style=\"width:52px;height:52px;background:{{ c.bg }};border-left:1px solid #E8EAED;\"></div>\n          </div>\n          <div style=\"padding:9px 12px;\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n              <span style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#3A3F4A;\">{{ c.name }}</span>\n              <span style=\"font:11px/1 'JetBrains Mono',monospace;color:#9DA2AC;\">{{ c.hex }}</span>\n            </div>\n            <div style=\"font-size:12px;color:#6E7685;margin-top:5px;\">{{ c.use }}</div>\n          </div>\n        </div>\n      </sc-for>\n    </div>\n  </section>\n\n  <!-- ============ 02 字体层级 ============ -->\n  <section style=\"margin-bottom:56px;\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid #DFE1E5;\">\n      <span style=\"font:700 13px/1 'JetBrains Mono',monospace;color:#0066FF;\">02</span>\n      <h2 style=\"font-size:19px;font-weight:600;color:#1A1D24;\">字体层级 Typography</h2>\n    </div>\n    <p style=\"font-size:13px;color:#6E7685;margin-bottom:16px;\">中文：PingFang SC / Microsoft YaHei &nbsp;·&nbsp; 数字/西文：JetBrains Mono（等宽强对齐，表格用 <code style=\"font-family:'JetBrains Mono',monospace;background:#F0F1F3;padding:1px 5px;border-radius:3px;\">tabular-nums</code>）&nbsp;·&nbsp; 组件基准 13px / 正文 14px</p>\n    <div style=\"border:1px solid #DFE1E5;border-radius:6px;background:#fff;padding:4px 20px;\">\n      <sc-for list=\"{{ typeRows }}\" as=\"t\" hint-placeholder-count=\"7\">\n        <div style=\"display:flex;align-items:baseline;gap:24px;padding:14px 0;border-bottom:1px solid #F0F1F3;\">\n          <span style=\"font:11px/1.4 'JetBrains Mono',monospace;color:#9DA2AC;min-width:118px;flex-shrink:0;\">{{ t.spec }}</span>\n          <span style=\"flex:1;{{ t.style }}\">{{ t.sample }}</span>\n        </div>\n      </sc-for>\n    </div>\n  </section>\n\n  <!-- ============ 03 间距系统 ============ -->\n  <section style=\"margin-bottom:56px;\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid #DFE1E5;\">\n      <span style=\"font:700 13px/1 'JetBrains Mono',monospace;color:#0066FF;\">03</span>\n      <h2 style=\"font-size:19px;font-weight:600;color:#1A1D24;\">间距系统 Spacing</h2>\n    </div>\n    <p style=\"font-size:13px;color:#6E7685;margin-bottom:16px;\">4px 基准网格。圆角 4（按钮）/ 6（卡片）/ 8（弹窗）。阴影仅用于浮层。</p>\n    <div style=\"border:1px solid #DFE1E5;border-radius:6px;background:#fff;padding:18px 20px;\">\n      <sc-for list=\"{{ spacingRows }}\" as=\"s\" hint-placeholder-count=\"8\">\n        <div style=\"display:flex;align-items:center;gap:18px;padding:5px 0;\">\n          <span style=\"font:11px/1.4 'JetBrains Mono',monospace;color:#9DA2AC;min-width:120px;\">{{ s.label }}</span>\n          <div style=\"height:20px;border-radius:2px;background:#E6F0FF;flex-shrink:0;width:{{ s.px }};\"></div>\n          <span style=\"font-size:12px;color:#6E7685;\">{{ s.use }}</span>\n        </div>\n      </sc-for>\n    </div>\n  </section>\n\n  <!-- ============ 04 布局规范 ============ -->  <section style=\"margin-bottom:56px;\">\n    <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid #DFE1E5;\">\n      <span style=\"font:700 13px/1 'JetBrains Mono',monospace;color:#0066FF;\">04<\\u002Fspan>\n      <h2 style=\"font-size:19px;font-weight:600;color:#1A1D24;\">布局规范 Layout<\\u002Fh2>\n    <\\u002Fdiv>\n    <p style=\"font-size:13px;color:#6E7685;margin-bottom:16px;\">标准后台管理系统采用<b>上-左-右三栏布局<\\u002Fb>：顶部导航栏（高度 56px，宽度 100%）、左侧侧边栏（宽度 220px，高度撑满视口）、主内容区（占据剩余空间）。<\\u002Fp>\n\n    <!-- 整体布局演示 -->\n    <div style=\"border:1px solid #DFE1E5;border-radius:8px;overflow:hidden;font-size:13px;box-shadow:0 1px 4px rgba(0,0,0,0.06);\">\n      <!-- ===== 顶部导航栏 ===== -->\n      <div style=\"height:56px;background:#fff;border-bottom:1px solid #E8EAED;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;\">\n        <!-- 左侧：Logo + 平台名称 -->\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <div style=\"width:32px;height:32px;border-radius:50%;border:2px solid #E8EAED;display:flex;align-items:center;justify-content:center;color:#9DA2AC;font-size:11px;font-weight:700;\">ico<\\u002Fdiv>\n          <span style=\"font-size:16px;font-weight:600;color:#1A1D24;\">游寄后台管理系统<\\u002Fspan>\n        <\\u002Fdiv>\n        <!-- 右侧：功能图标 -->\n        <div style=\"display:flex;align-items:center;gap:16px;\">\n          <!-- 任务列表图标 -->\n          <div style=\"width:32px;height:32px;border-radius:50%;background:#F7F8FA;display:flex;align-items:center;justify-content:center;color:#6E7685;font-size:14px;cursor:default;\" title=\"任务列表\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><rect x=\"3\" y=\"2\" width=\"10\" height=\"3\" rx=\"1\" fill=\"#9DA2AC\"/><rect x=\"3\" y=\"6.5\" width=\"10\" height=\"3\" rx=\"1\" fill=\"#9DA2AC\"/><rect x=\"3\" y=\"11\" width=\"10\" height=\"3\" rx=\"1\" fill=\"#9DA2AC\"/><\\u002Fsvg>\n          <\\u002Fdiv>\n          <!-- 消息中心图标（带角标） -->\n          <div style=\"width:32px;height:32px;border-radius:50%;background:#F7F8FA;display:flex;align-items:center;justify-content:center;color:#6E7685;font-size:14px;position:relative;cursor:default;\" title=\"消息中心\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 16 16\" fill=\"none\"><path d=\"M8 2C5.5 2 3.5 4 3.5 6.5V10L2 12V13h12v-1l-1.5-2V6.5C12.5 4 10.5 2 8 2Z\" stroke=\"#9DA2AC\" stroke-width=\"1.2\" fill=\"none\"/><path d=\"M6 13.5C6 14.3 6.9 15 8 15C9.1 15 10 14.3 10 13.5\" stroke=\"#9DA2AC\" stroke-width=\"1.2\" fill=\"none\"/><\\u002Fsvg>\n            <span style=\"position:absolute;top:-2px;right:-2px;min-width:18px;height:16px;border-radius:8px;background:#D9001B;color:#fff;font-size:10px;line-height:16px;text-align:center;padding:0 4px;font-weight:600;\">99<\\u002Fspan>\n          <\\u002Fdiv>\n          <!-- 用户头像 -->\n          <div style=\"width:32px;height:32px;border-radius:50%;background:#E6F0FF;display:flex;align-items:center;justify-content:center;color:#0066FF;font-size:13px;font-weight:600;cursor:default;\" title=\"用户信息\">U<\\u002Fdiv>\n        <\\u002Fdiv>\n      <\\u002Fdiv>\n\n      <!-- ===== 下方：侧边栏 + 主内容区 ===== -->\n      <div style=\"display:flex;height:420px;\">\n        <!-- 左侧侧边栏 -->\n        <div style=\"width:220px;background:#fff;border-right:1px solid #E8EAED;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;\">\n          <div style=\"padding:12px 16px 8px;font-size:11px;color:#9DA2AC;font-weight:500;letter-spacing:.03em;\">菜单导航<\\u002Fdiv>\n\n          <!-- 达人榜单（带 New 标记） -->\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:default;font-size:13px;color:#3A3F4A;\">\n            <div style=\"display:flex;align-items:center;gap:8px;\">\n              <span style=\"width:18px;height:18px;border-radius:50%;background:#F0F1F3;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#9DA2AC;\">\\u2606<\\u002Fspan>\n              <span>达人榜单<\\u002Fspan>\n            <\\u002Fdiv>\n            <span style=\"font-size:10px;background:#E6F0FF;color:#0066FF;padding:1px 6px;border-radius:3px;font-weight:500;\">New<\\u002Fspan>\n          <\\u002Fdiv>\n\n          <!-- 达人管理（可展开，已展开状态） -->\n          <div>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:default;font-size:13px;color:#0066FF;\">\n              <div style=\"display:flex;align-items:center;gap:8px;\">\n                <span style=\"width:18px;height:18px;border-radius:50%;background:#E6F0FF;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#0066FF;\">\\u25C6<\\u002Fspan>\n                <span style=\"font-weight:500;\">达人管理<\\u002Fspan>\n              <\\u002Fdiv>\n              <span style=\"font-size:10px;color:#0066FF;\">\\u25BC<\\u002Fspan>\n            <\\u002Fdiv>\n            <!-- 二级菜单 -->\n            <div style=\"padding-left:24px;\">\n              <div style=\"padding:8px 16px;margin:2px 8px;border-radius:4px;background:#E6F0FF;color:#0066FF;font-size:13px;font-weight:500;cursor:default;\">达人库<\\u002Fdiv>\n              <div style=\"padding:8px 16px;margin:2px 8px;border-radius:4px;color:#6E7685;font-size:13px;cursor:default;\">智能推荐达人<\\u002Fdiv>\n            <\\u002Fdiv>\n          <\\u002Fdiv>\n\n          <!-- 订单管理 -->\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:default;font-size:13px;color:#3A3F4A;margin-top:4px;\">\n            <div style=\"display:flex;align-items:center;gap:8px;\">\n              <span style=\"width:18px;height:18px;border-radius:50%;background:#F0F1F3;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#9DA2AC;\">\\u25A1<\\u002Fspan>\n              <span>订单管理<\\u002Fspan>\n            <\\u002Fdiv>\n            <span style=\"font-size:10px;color:#9DA2AC;\">\\u25B6<\\u002Fspan>\n          <\\u002Fdiv>\n\n          <!-- 柜机监控 -->\n          <div style=\"display:flex;align-items:center;padding:10px 16px;cursor:default;font-size:13px;color:#3A3F4A;\">\n            <div style=\"display:flex;align-items:center;gap:8px;\">\n              <span style=\"width:18px;height:18px;border-radius:50%;background:#F0F1F3;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#9DA2AC;\">\\u25CB<\\u002Fspan>\n              <span>柜机监控<\\u002Fspan>\n            <\\u002Fdiv>\n          <\\u002Fdiv>\n\n          <div style=\"margin-top:auto;padding:12px 16px;font-size:10px;color:#C7CAD1;border-top:1px solid #F0F1F3;\">220px 固定宽度<\\u002Fdiv>\n        <\\u002Fdiv>\n\n        <!-- 主内容区 -->\n        <div style=\"flex:1;background:#F7F8FA;display:flex;flex-direction:column;min-width:0;\">\n          <!-- 面包屑 + 标题 -->\n          <div style=\"background:#fff;padding:14px 24px;border-bottom:1px solid #E8EAED;\">\n            <div style=\"font-size:12px;color:#9DA2AC;margin-bottom:4px;\">达人管理 / 达人库<\\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:600;color:#1A1D24;\">达人库<\\u002Fdiv>\n          <\\u002Fdiv>\n          <!-- 内容区 -->\n          <div style=\"padding:20px 24px;flex:1;display:flex;flex-direction:column;gap:12px;\">\n            <!-- 筛选栏 -->\n            <div style=\"background:#fff;border:1px solid #E8EAED;border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;\">\n              <input placeholder=\"搜索达人名称\" style=\"font:12px inherit;height:30px;padding:0 10px;border-radius:4px;border:1px solid #DFE1E5;outline:none;width:180px;color:#3A3F4A;\">\n              <select style=\"font:12px inherit;height:30px;padding:0 8px;border-radius:4px;border:1px solid #DFE1E5;outline:none;color:#3A3F4A;\"><option>全部分类<\\u002Foption><\\u002Fselect>\n              <button style=\"font:500 12px/1.4 inherit;padding:5px 14px;border-radius:4px;border:none;cursor:default;background:#1677ff;color:#fff;\">查询<\\u002Fbutton>\n              <button style=\"font:500 12px/1.4 inherit;padding:5px 14px;border-radius:4px;cursor:default;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;\">重置<\\u002Fbutton>\n            <\\u002Fdiv>\n            <!-- 表格模拟 -->\n            <div style=\"background:#fff;border:1px solid #E8EAED;border-radius:8px;overflow:hidden;flex:1;\">\n              <div style=\"background:#F7F8FA;padding:10px 16px;font-size:12px;font-weight:600;color:#6E7685;border-bottom:1px solid #E8EAED;display:flex;gap:40px;\">\n                <span style=\"width:80px;\">达人名称<\\u002Fspan><span style=\"width:60px;\">分类<\\u002Fspan><span style=\"width:60px;\">粉丝数<\\u002Fspan><span style=\"width:60px;\">状态<\\u002Fspan><span style=\"width:80px;\">操作<\\u002Fspan>\n              <\\u002Fdiv>\n              <div style=\"padding:10px 16px;font-size:12px;color:#3A3F4A;border-bottom:1px solid #F0F1F3;display:flex;gap:40px;align-items:center;\">\n                <span style=\"width:80px;\">张三<\\u002Fspan><span style=\"width:60px;\">美食<\\u002Fspan><span style=\"width:60px;\">12.5万<\\u002Fspan><span style=\"width:60px;\"><span style=\"color:#0FC060;background:#E7F9F0;padding:2px 7px;border-radius:3px;font-size:11px;\">正常<\\u002Fspan><\\u002Fspan><span style=\"width:80px;\"><a style=\"color:#1677ff;cursor:default;\">详情<\\u002Fa> <a style=\"color:#1677ff;cursor:default;margin-left:8px;\">编辑<\\u002Fa><\\u002Fspan>\n              <\\u002Fdiv>\n              <div style=\"padding:10px 16px;font-size:12px;color:#3A3F4A;border-bottom:1px solid #F0F1F3;display:flex;gap:40px;align-items:center;\">\n                <span style=\"width:80px;\">李四<\\u002Fspan><span style=\"width:60px;\">旅游<\\u002Fspan><span style=\"width:60px;\">8.2万<\\u002Fspan><span style=\"width:60px;\"><span style=\"color:#0FC060;background:#E7F9F0;padding:2px 7px;border-radius:3px;font-size:11px;\">正常<\\u002Fspan><\\u002Fspan><span style=\"width:80px;\"><a style=\"color:#1677ff;cursor:default;\">详情<\\u002Fa> <a style=\"color:#1677ff;cursor:default;margin-left:8px;\">编辑<\\u002Fa><\\u002Fspan>\n              <\\u002Fdiv>\n              <div style=\"padding:10px 16px;font-size:12px;color:#3A3F4A;display:flex;gap:40px;align-items:center;\">\n                <span style=\"width:80px;\">王五<\\u002Fspan><span style=\"width:60px;\">时尚<\\u002Fspan><span style=\"width:60px;\">25.1万<\\u002Fspan><span style=\"width:60px;\"><span style=\"color:#0FC060;background:#E7F9F0;padding:2px 7px;border-radius:3px;font-size:11px;\">正常<\\u002Fspan><\\u002Fspan><span style=\"width:80px;\"><a style=\"color:#1677ff;cursor:default;\">详情<\\u002Fa> <a style=\"color:#1677ff;cursor:default;margin-left:8px;\">编辑<\\u002Fa><\\u002Fspan>\n              <\\u002Fdiv>\n            <\\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:flex-end;padding:6px 0;font-size:12px;color:#6E7685;\">主内容区 \\u00b7 自适应宽度 \\u00b7 圆角 8px 白色容器 \\u00b7 外层浅灰背景<\\u002Fdiv>\n          <\\u002Fdiv>\n        <\\u002Fdiv>\n      <\\u002Fdiv>\n    <\\u002Fdiv>\n\n    <!-- 布局尺寸标注 -->\n    <div style=\"display:flex;gap:24px;margin-top:16px;\">\n      <div style=\"flex:1;background:#fff;border:1px solid #DFE1E5;border-radius:6px;padding:14px 16px;\">\n        <div style=\"font-weight:600;font-size:13px;color:#1A1D24;margin-bottom:8px;\">顶部导航栏 Top Navbar<\\u002Fdiv>\n        <div style=\"font-size:12px;color:#6E7685;line-height:1.7;\">\n          高度固定 <b>56px<\\u002Fb> \\u00b7 宽度 100% \\u00b7 背景白色 \\u00b7 底部细灰色边框<br>\n          左侧：平台 Logo + 平台名称<br>\n          右侧：任务图标 \\u00b7 消息图标（含红色角标） \\u00b7 用户头像\n        <\\u002Fdiv>\n      <\\u002Fdiv>\n      <div style=\"flex:1;background:#fff;border:1px solid #DFE1E5;border-radius:6px;padding:14px 16px;\">\n        <div style=\"font-weight:600;font-size:13px;color:#1A1D24;margin-bottom:8px;\">左侧侧边栏 Sidebar<\\u002Fdiv>\n        <div style=\"font-size:12px;color:#6E7685;line-height:1.7;\">\n          宽度固定 <b>220px<\\u002Fb> \\u00b7 高度撑满视口 \\u00b7 背景白色 \\u00b7 右侧细灰色边框<br>\n          菜单项：图标 + 文字 + 展开箭头 \\u00b7 支持二级菜单缩进<br>\n          选中态：浅蓝背景 + 蓝色文字\n        <\\u002Fdiv>\n      <\\u002Fdiv>\n      <div style=\"flex:1;background:#fff;border:1px solid #DFE1E5;border-radius:6px;padding:14px 16px;\">\n        <div style=\"font-weight:600;font-size:13px;color:#1A1D24;margin-bottom:8px;\">主内容区 Content<\\u002Fdiv>\n        <div style=\"font-size:12px;color:#6E7685;line-height:1.7;\">\n          占据剩余空间 \\u00b7 背景 #F7F8FA \\u00b7 内容容器白色圆角 8px \\u00b7 内边距 20px<br>\n          包含：面包屑 \\u00b7 页面标题 \\u00b7 筛选区 \\u00b7 数据表格 \\u00b7 分页器\n        <\\u002Fdiv>\n      <\\u0 ;\">\n          <span style=\"color:#9DA2AC;font-size:12px;\">~</span>\n          <input type=\"date\" style=\"font:12px inherit;border:none;outline:none;color:#3A3F4A;background:none;\">\n        </div>\n        <label style=\"display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#3A3F4A;cursor:pointer;\"><input type=\"checkbox\" style=\"width:15px;height:15px;accent-color:#0066FF;cursor:pointer;\">只看我处理的</label>\n        <button style=\"font:500 13px/1.4 inherit;padding:5px 16px;border-radius:4px;border:1px solid transparent;cursor:pointer;background:#0066FF;color:#fff;\">查询</button>\n        <button style=\"font:500 13px/1.4 inherit;padding:5px 16px;border-radius:4px;cursor:pointer;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;\">重置</button>\n      </div>\n      <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n        <span style=\"font:11px/1 'JetBrains Mono',monospace;color:#9DA2AC;\">状态示例</span>\n        <input placeholder=\"聚焦态\" style=\"font:13px inherit;height:30px;line-height:30px;padding:0 10px;border-radius:4px;border:1px solid #0066FF;box-shadow:0 0 0 2px #E6F0FF;background:#fff;color:#3A3F4A;outline:none;width:150px;\">\n        <input placeholder=\"禁用态\" disabled=\"\" style=\"font:13px inherit;height:30px;line-height:30px;padding:0 10px;border-radius:4px;border:1px solid #DFE1E5;background:#F7F8FA;color:#9DA2AC;width:150px;cursor:not-allowed;\">\n        <input placeholder=\"错误态\" style=\"font:13px inherit;height:30px;line-height:30px;padding:0 10px;border-radius:4px;border:1px solid #D9001B;box-shadow:0 0 0 2px #FFE8EB;background:#fff;color:#3A3F4A;outline:none;width:150px;\">\n        <span style=\"font-size:12px;color:#D9001B;\">请输入有效的订单号</span>\n        <span style=\"font-size:12px;color:#9DA2AC;\">辅助提示文字</span>\n      </div>\n    </div>\n  </div>\n\n  <!-- ---- 开关 / 单选 / 复选 ---- -->\n  <div style=\"margin-bottom:36px;\">\n    <div style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#6E7685;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;\">开关 / 单选 / 复选 · Switch · Radio · Checkbox</div>\n    <div style=\"border:1px solid #DFE1E5;border-radius:6px;background:#fff;padding:20px;display:flex;align-items:center;gap:32px;flex-wrap:wrap;\">\n      <div style=\"display:flex;align-items:center;gap:12px;\">\n        <span style=\"width:38px;height:22px;border-radius:11px;background:#0066FF;position:relative;display:inline-block;\"><span style=\"position:absolute;top:2px;left:18px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);\"></span></span>\n        <span style=\"width:38px;height:22px;border-radius:11px;background:#C7CAD1;position:relative;display:inline-block;\"><span style=\"position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);\"></span></span>\n        <span style=\"font-size:12px;color:#9DA2AC;font-family:'JetBrains Mono',monospace;\">开 / 关</span>\n      </div>\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <label style=\"display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#3A3F4A;cursor:pointer;\"><span style=\"width:15px;height:15px;border-radius:50%;border:5px solid #0066FF;background:#fff;box-sizing:border-box;\"></span>行李寄存</label>\n        <label style=\"display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#3A3F4A;cursor:pointer;\"><span style=\"width:15px;height:15px;border-radius:50%;border:1px solid #C7CAD1;background:#fff;box-sizing:border-box;\"></span>行李寄送</label>\n      </div>\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <label style=\"display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#3A3F4A;cursor:pointer;\"><span style=\"width:15px;height:15px;border-radius:3px;background:#0066FF;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:10px;\">✓</span>已选</label>\n        <label style=\"display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#3A3F4A;cursor:pointer;\"><span style=\"width:15px;height:15px;border-radius:3px;border:1px solid #C7CAD1;background:#fff;box-sizing:border-box;\"></span>未选</label>\n      </div>\n      <div style=\"display:inline-flex;border:1px solid #DFE1E5;border-radius:4px;overflow:hidden;\">\n        <span style=\"font-size:12px;padding:5px 14px;background:#0066FF;color:#fff;\">今日</span>\n        <span style=\"font-size:12px;padding:5px 14px;background:#fff;color:#6E7685;border-left:1px solid #DFE1E5;\">近 7 天</span>\n        <span style=\"font-size:12px;padding:5px 14px;background:#fff;color:#6E7685;border-left:1px solid #DFE1E5;\">近 30 天</span>\n      </div>\n    </div>\n  </div>\n\n  <!-- ---- 面包屑 + 页头操作栏 ---- -->\n  <div style=\"margin-bottom:36px;\">\n    <div style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#6E7685;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;\">面包屑 + 页头操作栏 · Breadcrumb &amp; Page Header</div>\n    <div style=\"border:1px solid #DFE1E5;border-radius:6px;background:#fff;overflow:hidden;\">\n      <div style=\"padding:14px 20px;border-bottom:1px solid #F0F1F3;\">\n        <div style=\"display:flex;align-items:center;gap:6px;font-size:12px;color:#9DA2AC;margin-bottom:8px;\">\n          <span>业务管理</span><span>/</span><span>订单管理</span><span>/</span><span style=\"color:#6E7685;\">行李寄存</span>\n        </div>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n          <div style=\"display:flex;align-items:center;gap:10px;\">\n            <h3 style=\"font-size:18px;font-weight:600;color:#1A1D24;\">行李寄存订单</h3>\n            <span style=\"display:inline-flex;align-items:center;font-size:12px;font-weight:500;line-height:1;padding:4px 9px;border-radius:3px;color:#0091D5;background:#E4F4FB;border:1px solid #AFDDF2;\">共 128 单</span>\n          </div>\n          <div style=\"display:flex;align-items:center;gap:10px;\">\n            <button style=\"font:500 13px/1.4 inherit;padding:6px 14px;border-radius:4px;cursor:pointer;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;\">导出</button>\n            <button style=\"font:500 13px/1.4 inherit;padding:6px 16px 6px 14px;border-radius:4px;border:1px solid transparent;cursor:pointer;background:#0066FF;color:#fff;display:inline-flex;align-items:center;gap:6px;\"><span style=\"font-size:15px;line-height:1;\">+</span>新建寄存</button>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <!-- ---- 数据表格 ---- -->\n  <div style=\"margin-bottom:36px;\">\n    <div style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#6E7685;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;\">数据表格 · Table</div>\n    <p style=\"font-size:12px;color:#9DA2AC;margin-bottom:14px;\">表头 12px/600 #6E7685 灰底，数据行 13px，行高 ~38px，悬停 #F0F1F3，数字列等宽右对齐。含选择列、状态标签、操作列。</p>\n    <div style=\"border:1px solid #DFE1E5;border-radius:6px;background:#fff;overflow:hidden;\">\n      <div style=\"overflow-x:auto;\">\n        <table style=\"width:100%;border-collapse:collapse;font-size:13px;\">\n          <thead><tr>\n            <th style=\"text-align:left;font-weight:600;font-size:12px;color:#6E7685;padding:9px 12px;background:#F7F8FA;border-bottom:1px solid #DFE1E5;white-space:nowrap;width:36px;\"><input type=\"checkbox\" style=\"width:15px;height:15px;accent-color:#0066FF;\"></th>\n            <th style=\"text-align:left;font-weight:600;font-size:12px;color:#6E7685;padding:9px 12px;background:#F7F8FA;border-bottom:1px solid #DFE1E5;white-space:nowrap;\">订单号</th>\n            <th style=\"text-align:left;font-weight:600;font-size:12px;color:#6E7685;padding:9px 12px;background:#F7F8FA;border-bottom:1px solid #DFE1E5;white-space:nowrap;\">类型</th>\n            <th style=\"text-align:left;font-weight:600;font-size:12px;color:#6E7685;padding:9px 12px;background:#F7F8FA;border-bottom:1px solid #DFE1E5;white-space:nowrap;\">客户手机</th>\n            <th style=\"text-align:left;font-weight:600;font-size:12px;color:#6E7685;padding:9px 12px;background:#F7F8FA;border-bottom:1px solid #DFE1E5;white-space:nowrap;\">柜机点位 / 路线</th>\n            <th style=\"text-align:left;font-weight:600;font-size:12px;color:#6E7685;padding:9px 12px;background:#F7F8FA;border-bottom:1px solid #DFE1E5;white-space:nowrap;\">下单时间</th>\n            <th style=\"text-align:right;font-weight:600;font-size:12px;color:#6E7685;padding:9px 12px;background:#F7F8FA;border-bottom:1px solid #DFE1E5;white-space:nowrap;\">金额</th>\n            <th style=\"text-align:left;font-weight:600;font-size:12px;color:#6E7685;padding:9px 12px;background:#F7F8FA;border-bottom:1px solid #DFE1E5;white-space:nowrap;\">状态</th>\n            <th style=\"text-align:left;font-weight:600;font-size:12px;color:#6E7685;padding:9px 12px;background:#F7F8FA;border-bottom:1px solid #DFE1E5;white-space:nowrap;\">操作</th>\n          </tr></thead>\n          <tbody>\n            <sc-for list=\"{{ demoRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n<tr style=\"border-bottom:1px solid #F0F1F3;\">\n                <td style=\"padding:9px 12px;\"><input type=\"checkbox\" style=\"width:15px;height:15px;accent-color:#0066FF;\"></td>\n                <td style=\"padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;font-variant-numeric:tabular-nums;color:#3A3F4A;white-space:nowrap;\">{{ r.no }}</td>\n                <td style=\"padding:9px 12px;white-space:nowrap;\">{{ r.type }}</td>\n                <td style=\"padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#6E7685;white-space:nowrap;\">{{ r.phone }}</td>\n                <td style=\"padding:9px 12px;white-space:nowrap;\">{{ r.loc }}</td>\n                <td style=\"padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#6E7685;white-space:nowrap;\">{{ r.time }}</td>\n                <td style=\"padding:9px 12px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap;\">{{ r.amount }}</td>\n                <td style=\"padding:9px 12px;white-space:nowrap;\"><span style=\"display:inline-flex;align-items:center;font-size:12px;font-weight:500;line-height:1;padding:4px 9px;border-radius:3px;{{ r.tagStyle }}\">{{ r.status }}</span></td>\n                <td style=\"padding:9px 12px;white-space:nowrap;\"><span style=\"display:inline-flex;gap:12px;color:#1677ff;cursor:default;\">{{ r.actions }}</span></td>\n              </tr>\n            </sc-for>\n            \n          \n          </tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n\n  <!-- ---- 分页器 ---- -->  <div style=\"margin-bottom:36px;\">\n    <div style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#6E7685;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;\">分页器 \\u00b7 Pagination<\\u002Fdiv>\n    <p style=\"font-size:12px;color:#9DA2AC;margin-bottom:14px;\">左侧分页导航 + 中间每页条数选择 + 右侧跳转与数据统计。主色 #1677ff，统一高度 32px，轻微圆角。<\\u002Fp>\n    <div style=\"border:1px solid #DFE1E5;border-radius:6px;background:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;font-size:13px;\">\n\n      <!-- 左侧：核心分页导航区 -->\n      <div style=\"display:flex;align-items:center;gap:4px;\">\n        <!-- 上一页按钮（第1页时不可点击） -->\n        <button style=\"min-width:32px;height:32px;padding:0 8px;font-size:13px;color:#C7CAD1;background:#F7F8FA;border:1px solid #DFE1E5;border-radius:4px;cursor:default;display:inline-flex;align-items:center;justify-content:center;\" disabled>&#8249;<\\u002Fbutton>\n        <!-- 当前页码（深蓝色背景） -->\n        <button style=\"min-width:32px;height:32px;padding:0 8px;font-size:13px;font-weight:500;color:#fff;background:#1677ff;border:1px solid #1677ff;border-radius:4px;cursor:default;\">1<\\u002Fbutton>\n        <!-- 普通页码 -->\n        <button style=\"min-width:32px;height:32px;padding:0 8px;font-size:13px;color:#3A3F4A;background:transparent;border:1px solid transparent;border-radius:4px;cursor:default;\">2<\\u002Fbutton>\n        <button style=\"min-width:32px;height:32px;padding:0 8px;font-size:13px;color:#3A3F4A;background:transparent;border:1px solid transparent;border-radius:4px;cursor:default;\">3<\\u002Fbutton>\n        <button style=\"min-width:32px;height:32px;padding:0 8px;font-size:13px;color:#3A3F4A;background:transparent;border:1px solid transparent;border-radius:4px;cursor:default;\">4<\\u002Fbutton>\n        <button style=\"min-width:32px;height:32px;padding:0 8px;font-size:13px;color:#3A3F4A;background:transparent;border:1px solid transparent;border-radius:4px;cursor:default;\">5<\\u002Fbutton>\n        <!-- 省略号 -->\n        <span style=\"min-width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;color:#9DA2AC;font-size:13px;letter-spacing:1px;\">...<\\u002Fspan>\n        <!-- 最后一页 -->\n        <button style=\"min-width:32px;height:32px;padding:0 8px;font-size:13px;color:#3A3F4A;background:transparent;border:1px solid transparent;border-radius:4px;cursor:default;\">43<\\u002Fbutton>\n        <!-- 下一页按钮 -->\n        <button style=\"min-width:32px;height:32px;padding:0 8px;font-size:13px;color:#3A3F4A;background:#fff;border:1px solid #DFE1E5;border-radius:4px;cursor:default;display:inline-flex;align-items:center;justify-content:center;\">&#8250;<\\u002Fbutton>\n      <\\u002Fdiv>\n\n      <!-- 中间：每页条数选择区 -->\n      <div style=\"display:flex;align-items:center;gap:6px;\">\n        <select style=\"font:13px inherit;height:32px;padding:0 24px 0 10px;border-radius:4px;border:1px solid #DFE1E5;background:#fff;color:#3A3F4A;outline:none;cursor:default;appearance:none;background-image:url('data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2210%22 height=%226%22><path d=%22M0 0l5 6 5-6z%22 fill=%22%239DA2AC%22/></svg>');background-repeat:no-repeat;background-position:right 8px center;\">\n          <option>10条\\u002F页<\\u002Foption>\n          <option>20条\\u002F页<\\u002Foption>\n          <option>50条\\u002F页<\\u002Foption>\n          <option>100条\\u002F页<\\u002Foption>\n        <\\u002Fselect>\n      <\\u002Fdiv>\n\n      <!-- 右侧：跳转与数据统计区 -->\n      <div style=\"display:flex;align-items:center;gap:6px;font-size:13px;color:#6E7685;\">\n        <span>跳至<\\u002Fspan>\n        <input value=\"1\" style=\"font:13px inherit;width:48px;height:32px;text-align:center;border-radius:4px;border:1px solid #DFE1E5;color:#3A3F4A;outline:none;background:#fff;\">\n        <span>页<\\u002Fspan>\n        <span style=\"color:#9DA2AC;margin-left:8px;\">共 40 条记录 \\u2003第 1/8 页<\\u002Fspan>\n      <\\u002Fdiv>\n    <\\u002Fdiv>\n  <\\u002Fdiv>  <!-- ---- Tab 切换 ---- -->\n  <div style=\"margin-bottom:36px;\">\n    <div style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#6E7685;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;\">Tab 切换 · Tabs</div>\n    <p style=\"font-size:12px;color:#9DA2AC;margin-bottom:14px;\">下划线式（页内主切换）+ 卡片式（列表内子集）两种变体，均可点击切换。</p>\n    <div style=\"border:1px solid #DFE1E5;border-radius:6px;background:#fff;padding:20px;display:flex;flex-direction:column;gap:24px;\">\n      <div>\n        <div style=\"font:11px/1 'JetBrains Mono',monospace;color:#9DA2AC;margin-bottom:10px;\">下划线式（默认）</div>\n        <div style=\"display:flex;border-bottom:2px solid #DFE1E5;\">\n          <sc-for list=\"{{ tabItems }}\" as=\"t\" hint-placeholder-count=\"2\">\n            <button style=\"{{ t.style }}\" onclick=\"{{ t.onClick }}\">{{ t.label }}</button>\n          </sc-for>\n        </div>\n      </div>\n      <div>\n        <div style=\"font:11px/1 'JetBrains Mono',monospace;color:#9DA2AC;margin-bottom:10px;\">卡片式</div>\n        <div style=\"display:flex;\">\n          <sc-for list=\"{{ cardTabItems }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <button style=\"{{ t.style }}\" onclick=\"{{ t.onClick }}\">{{ t.label }}</button>\n          </sc-for>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <!-- ---- 下拉菜单 / 更多操作 ---- -->\n  <div style=\"margin-bottom:36px;\">\n    <div style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#6E7685;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;\">下拉菜单 / 更多操作 · Dropdown</div>\n    <div style=\"border:1px solid #DFE1E5;border-radius:6px;background:#fff;padding:20px;display:flex;gap:40px;align-items:flex-start;flex-wrap:wrap;\">\n      <div>\n        <div style=\"font:11px/1 'JetBrains Mono',monospace;color:#9DA2AC;margin-bottom:10px;\">操作列「更多」气泡</div>\n        <div style=\"width:160px;background:#fff;border:1px solid #DFE1E5;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:4px 0;overflow:hidden;\">\n          <div style=\"padding:8px 14px;font-size:13px;color:#3A3F4A;cursor:pointer;\">查看详情</div>\n          <div style=\"padding:8px 14px;font-size:13px;color:#3A3F4A;cursor:pointer;background:#F0F1F3;\">修改点位</div>\n          <div style=\"padding:8px 14px;font-size:13px;color:#3A3F4A;cursor:pointer;\">打印面单</div>\n          <div style=\"height:1px;background:#F0F1F3;margin:4px 0;\"></div>\n          <div style=\"padding:8px 14px;font-size:13px;color:#D9001B;cursor:pointer;\">标记异常</div>\n        </div>\n      </div>\n      <div>\n        <div style=\"font:11px/1 'JetBrains Mono',monospace;color:#9DA2AC;margin-bottom:10px;\">触发按钮</div>\n        <button style=\"font:500 13px/1.4 inherit;padding:5px 12px;border-radius:4px;cursor:pointer;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;display:inline-flex;align-items:center;gap:6px;\">更多操作 <span style=\"font-size:10px;color:#9DA2AC;\">▾</span></button>\n      </div>\n    </div>\n  </div>\n\n  <!-- ---- 浮层：抽屉 / 弹窗 / 对话框（可交互触发）---- -->\n  <div style=\"margin-bottom:36px;\">\n    <div style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#6E7685;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;\">浮层 · Drawer / Modal / Dialog（点击触发）</div>\n    <p style=\"font-size:12px;color:#9DA2AC;margin-bottom:14px;\">遮罩 rgba(0,0,0,.3)。侧边抽屉 480px（详情/编辑），居中弹窗（表单），6 类对话框（信息/成功/警告/错误/确认/系统）。</p>\n    <div style=\"border:1px solid #DFE1E5;border-radius:6px;background:#fff;padding:20px;display:flex;flex-wrap:wrap;gap:10px;\">\n      <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;border:1px solid transparent;cursor:pointer;background:#0066FF;color:#fff;\" onclick=\"{{ openDrawer }}\">侧边抽屉</button>\n      <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;cursor:pointer;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;\" onclick=\"{{ openModal }}\">居中弹窗</button>\n      <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;cursor:pointer;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;\" onclick=\"{{ openInfo }}\">信息</button>\n      <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;cursor:pointer;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;\" onclick=\"{{ openSuccess }}\">成功</button>\n      <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;cursor:pointer;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;\" onclick=\"{{ openWarning }}\">警告</button>\n      <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;cursor:pointer;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;\" onclick=\"{{ openDanger }}\">错误</button>\n      <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;cursor:pointer;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;\" onclick=\"{{ openConfirm }}\">操作确认</button>\n    </div>\n  </div>\n\n  <!-- ---- 通知提醒 ---- -->\n  <div style=\"margin-bottom:36px;\">\n    <div style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#6E7685;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;\">通知提醒 · Alert（页面内嵌）</div>\n    <div style=\"border:1px solid #DFE1E5;border-radius:6px;background:#fff;padding:20px;display:flex;flex-direction:column;gap:12px;max-width:680px;\">\n      <div style=\"display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:6px;font-size:13px;background:#E7F9F0;border:1px solid #B5EDD0;color:#0A9A4D;\"><span style=\"flex-shrink:0;width:18px;height:18px;border-radius:50%;background:#0FC060;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;\">✓</span><div style=\"flex:1;\"><b>成功通知</b> —— 导出任务已提交，可在「任务中心-下载任务」查看。</div><span style=\"cursor:pointer;opacity:.5;\">×</span></div>\n      <div style=\"display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:6px;font-size:13px;background:#FDF2E9;border:1px solid #F5D5B9;color:#C45D20;\"><span style=\"flex-shrink:0;width:18px;height:18px;border-radius:50%;background:#E7772D;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;\">!</span><div style=\"flex:1;\"><b>警告通知</b> —— 有 3 台柜机格口占用率超过 90%，请及时调度。</div><span style=\"cursor:pointer;opacity:.5;\">×</span></div>\n      <div style=\"display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:6px;font-size:13px;background:#E4F4FB;border:1px solid #AFDDF2;color:#007CB8;\"><span style=\"flex-shrink:0;width:18px;height:18px;border-radius:50%;background:#0091D5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;\">i</span><div style=\"flex:1;\"><b>消息通知</b> —— 系统将于今晚 23:00 进行维护，预计 20 分钟。</div><span style=\"cursor:pointer;opacity:.5;\">×</span></div>\n      <div style=\"display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:6px;font-size:13px;background:#FFE8EB;border:1px solid #F5B5BD;color:#B80017;\"><span style=\"flex-shrink:0;width:18px;height:18px;border-radius:50%;background:#D9001B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;\">✕</span><div style=\"flex:1;\"><b>错误通知</b> —— 财务对账数据同步失败，请检查网络后重试。</div><span style=\"cursor:pointer;opacity:.5;\">×</span></div>\n    </div>\n  </div>\n\n  <!-- ---- Toast ---- -->\n  <div style=\"margin-bottom:36px;\">\n    <div style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#6E7685;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;\">Toast 提示 · 顶部居中，自动消失（点击触发）</div>\n    <div style=\"border:1px solid #DFE1E5;border-radius:6px;background:#fff;padding:20px;display:flex;gap:10px;flex-wrap:wrap;\">\n      <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;border:1px solid transparent;cursor:pointer;background:#0FC060;color:#fff;\" onclick=\"{{ toastSuccess }}\">成功 Toast</button>\n      <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;border:1px solid transparent;cursor:pointer;background:#E7772D;color:#fff;\" onclick=\"{{ toastWarning }}\">警告 Toast</button>\n      <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;border:1px solid transparent;cursor:pointer;background:#D9001B;color:#fff;\" onclick=\"{{ toastDanger }}\">错误 Toast</button>\n    </div>\n  </div>\n\n  <!-- ---- Tooltip / Popconfirm ---- -->\n  <div style=\"margin-bottom:36px;\">\n    <div style=\"font:600 12px/1 'JetBrains Mono',monospace;color:#6E7685;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;\">文字提示 / 气泡确认 · Tooltip &amp; Popconfirm</div>\n    <div style=\"border:1px solid #DFE1E5;border-radius:6px;background:#fff;padding:32px 20px;display:flex;gap:56px;align-items:flex-start;flex-wrap:wrap;\">\n      <div style=\"position:relative;display:inline-block;\">\n        <span style=\"position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1A1D24;color:#fff;font-size:12px;padding:5px 10px;border-radius:4px;white-space:nowrap;\">超时未取件将自动转寄</span>\n        <span style=\"position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1A1D24;\"></span>\n        <button style=\"font:500 13px/1.4 inherit;padding:6px 14px;border-radius:4px;cursor:pointer;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;\">Tooltip 目标</but auto;padding:20px;\">\n          <div style=\"margin-bottom:16px;\"><div style=\"font-size:13px;color:#6E7685;margin-bottom:3px;\">订单号</div><div style=\"font-size:14px;color:#3A3F4A;font-family:'JetBrains Mono',monospace;\">HB20260703001</div></div>\n          <div style=\"margin-bottom:16px;\"><div style=\"font-size:13px;color:#6E7685;margin-bottom:3px;\">订单类型</div><div style=\"font-size:14px;color:#3A3F4A;\">行李寄存</div></div>\n          <div style=\"margin-bottom:16px;\"><div style=\"font-size:13px;color:#6E7685;margin-bottom:3px;\">客户手机</div><div style=\"font-size:14px;color:#3A3F4A;\">138****6789</div></div>\n          <div style=\"margin-bottom:16px;\"><div style=\"font-size:13px;color:#6E7685;margin-bottom:3px;\">柜机点位</div><div style=\"font-size:14px;color:#3A3F4A;\">湖滨银泰A馆 3号柜</div></div>\n          <div style=\"margin-bottom:16px;\"><div style=\"font-size:13px;color:#6E7685;margin-bottom:3px;\">状态</div><div><span style=\"display:inline-flex;align-items:center;font-size:12px;font-weight:500;padding:4px 9px;border-radius:3px;color:#0091D5;background:#E4F4FB;border:1px solid #AFDDF2;\">配送中</span></div></div>\n          <div style=\"background:#F7F8FA;border:1px solid #E8EAED;border-radius:6px;padding:14px;text-align:center;color:#9DA2AC;font-size:12px;\">弹窗容区 · padding: 20px</div>\n        </div>\n        <div style=\"display:flex;align-items:center;justify-content:flex-end;gap:12px;padding:16px 20px;border-top:1px solid #DFE1E5;\">\n          <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;cursor:pointer;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;\" onclick=\"{{ closeDrawer }}\">取消</button>\n          <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;border:1px solid transparent;cursor:pointer;background:#0066FF;color:#fff;\" onclick=\"{{ closeDrawer }}\">保存</button>\n        </div>\n      </div>\n    </div>\n  </sc-if>\n\n  <sc-if value=\"{{ modal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1100;display:flex;align-items:center;justify-content:center;\" onclick=\"{{ closeModal }}\">\n      <div style=\"background:#fff;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.12);width:480px;max-width:92vw;animation:ds-modal-in .15s ease;\" onclick=\"{{ stop }}\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid #DFE1E5;\">\n          <span style=\"font-size:16px;font-weight:600;color:#1A1D24;\">新建寄存订单</span>\n          <span style=\"font-size:20px;color:#9DA2AC;cursor:pointer;line-height:1;\" onclick=\"{{ closeModal }}\">×</span>\n        </div>\n        <div style=\"padding:24px;display:flex;flex-direction:column;gap:16px;\">\n          <div style=\"display:flex;align-items:center;gap:12px;\"><span style=\"font-size:14px;color:#3A3F4A;min-width:80px;text-align:right;\"><span style=\"color:#FF6666;\">*</span>客户手机：</span><input placeholder=\"请输入手机号\" style=\"flex:1;font:13px inherit;height:30px;padding:0 10px;border-radius:4px;border:1px solid #DFE1E5;outline:none;color:#3A3F4A;\"></div>\n          <div style=\"display:flex;align-items:center;gap:12px;\"><span style=\"font-size:14px;color:#3A3F4A;min-width:80px;text-align:right;\"><span style=\"color:#FF6666;\">*</span>柜机点位：</span><select style=\"flex:1;font:13px inherit;height:30px;padding:0 10px;border-radius:4px;border:1px solid #DFE1E5;color:#3A3F4A;cursor:pointer;\"><option>湖滨银泰A馆</option><option>雷峰塔景区</option></select></div>\n          <div style=\"display:flex;align-items:center;gap:12px;\"><span style=\"font-size:14px;color:#3A3F4A;min-width:80px;text-align:right;\">备注：</span><input placeholder=\"选填\" style=\"flex:1;font:13px inherit;height:30px;padding:0 10px;border-radius:4px;border:1px solid #DFE1E5;outline:none;color:#3A3F4A;\"></div>\n        </div>\n        <div style=\"display:flex;align-items:center;justify-content:flex-end;gap:12px;padding:16px 24px;border-top:1px solid #DFE1E5;\">\n          <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;cursor:pointer;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;\" onclick=\"{{ closeModal }}\">取消</button>\n          <button style=\"font:500 13px/1.4 inherit;padding:6px 16px;border-radius:4px;border:1px solid transparent;cursor:pointer;background:#0066FF;color:#fff;\" onclick=\"{{ closeModal }}\">确定</button>\n        </div>\n      </div>\n    </div>\n  </sc-if>\n\n  <sc-if value=\"{{ dialog }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1200;display:flex;align-items:center;justify-content:center;\" onclick=\"{{ closeDialog }}\">\n      <div style=\"background:#fff;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.12);width:400px;max-width:92vw;animation:ds-modal-in .15s ease;\" onclick=\"{{ stop }}\">\n        <div style=\"padding:32px 24px 20px;text-align:center;\">\n          <div style=\"width:48px;height:48px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;background:{{ dlg.bg }};color:{{ dlg.c }};\">{{ dlg.icon }}</div>\n          <div style=\"font-size:16px;font-weight:600;color:#1A1D24;margin-bottom:8px;\">{{ dlg.title }}</div>\n          <div style=\"font-size:13px;color:#6E7685;line-height:1.6;\">{{ dlg.desc }}</div>\n        </div>\n        <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;padding:0 24px 24px;\">\n          <sc-if value=\"{{ dlg.cancel }}\" hint-placeholder-val=\"{{ false }}\">\n            <button style=\"font:500 13px/1.4 inherit;padding:6px 20px;border-radius:4px;cursor:pointer;background:#fff;color:#3A3F4A;border:1px solid #DFE1E5;\" onclick=\"{{ closeDialog }}\">取消</button>\n          </sc-if>\n          <button style=\"font:500 13px/1.4 inherit;padding:6px 20px;border-radius:4px;border:1px solid transparent;cursor:pointer;backgrou
